<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BalticRadar</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>try{var _t=localStorage.getItem("br_theme")||"auto";var _e=_t==="auto"?(matchMedia("(prefers-color-scheme: light)").matches?"light":"dark"):_t;document.documentElement.setAttribute("data-theme",_e);}catch(_){}</script>
<style>
  :root{--bg:#0d1117;--card:#161b22;--card2:#1c232d;--ink:#e6edf3;--mut:#9aa6b2;--line:#262c36;
    --accent:#ff4605;--accent2:#ff6a32;--gold:#ff7a3c;--orange:#ff4605;--up:#ff6b6b;--down:#3fb950;
    --dark:#0a0e14;--dark2:#11161e;
    --lv:#c0314f;--lt:#f5b301;--ee:#2b9fe6;--shadow:0 8px 28px rgba(0,0,0,.45);}
  html[data-theme="light"]{--bg:#f2f5f9;--card:#ffffff;--card2:#eef2f7;--ink:#18202c;--mut:#5a6573;
    --line:#e1e7ee;--dark:#e7ecf3;--dark2:#dde4ee;--shadow:0 10px 30px rgba(30,55,95,.10);}
  html{transition:background .2s,color .2s}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.65 "Mulish",Arial,Helvetica,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .logo{cursor:pointer;transition:transform .15s,opacity .15s}
  .logo:hover{opacity:.88}.logo:active{transform:scale(.96)}
  button{transition:transform .12s,filter .15s,background .15s,border-color .15s,box-shadow .15s}
  button:active{transform:translateY(1px)}
  .reveal{opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s cubic-bezier(.2,.8,.2,1)}
  .reveal.in{opacity:1;transform:none}
  @keyframes slowzoom{from{transform:scale(1.04)}to{transform:scale(1.14)}}
  @media(prefers-reduced-motion:no-preference){.heroImg{animation:slowzoom 22s ease-in-out infinite alternate}}
  header{position:sticky;top:0;z-index:20;background:var(--dark);border-bottom:1px solid rgba(255,255,255,.08)}
  .bar{max-width:1240px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .logo{font-size:21px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:9px;color:#fff}
  .logo b{color:var(--gold)}
  .logo .ic{width:26px;height:26px}
  .nav{display:flex;gap:20px;margin-left:8px}
  .nav a{color:#cdd6e3;font-size:13.5px;font-weight:600;text-decoration:none;cursor:pointer;transition:.15s}
  .nav a:hover{color:#fff}
  @media(max-width:860px){.nav{display:none}}
  .status{font-size:13px;color:var(--mut);display:flex;align-items:center;gap:7px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--down);box-shadow:0 0 0 0 rgba(26,157,84,.6);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(26,157,84,.5)}70%{box-shadow:0 0 0 8px rgba(26,157,84,0)}100%{box-shadow:0 0 0 0 rgba(26,157,84,0)}}
  .pills{display:flex;flex-wrap:wrap;gap:6px}
  .pills button{background:var(--card);border:1px solid var(--line);color:var(--ink);padding:7px 12px;
    border-radius:22px;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;display:flex;align-items:center;gap:6px}
  .pills button:hover{border-color:#c5d0de}
  .pills button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .langsel{background:var(--card);border:1px solid var(--line);color:var(--ink);padding:7px 10px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;outline:none}
  .count{font-size:13px;color:var(--mut);font-weight:500}
  .notify{background:var(--orange);color:#fff;border:none;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
  .notify:hover{filter:brightness(.95)}
  #subform input,#subform select{background:var(--card);border:1px solid var(--line);color:var(--ink);padding:10px 12px;border-radius:9px;font-size:14px;outline:none;width:100%}
  #subform input:focus,#subform select:focus{border-color:var(--accent)}
  .controls{max-width:1240px;margin:0 auto;padding:0 24px 14px;display:flex;gap:10px;flex-wrap:wrap}
  .controls input,.controls select{background:var(--card);border:1px solid var(--line);color:var(--ink);
    padding:9px 12px;border-radius:10px;font-size:13.5px;outline:none;transition:.15s}
  .controls input:focus,.controls select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,111,235,.12)}
  .controls input[type=number]{width:100px}
  .controls .search{flex:1;min-width:180px}
  .topright{margin-left:auto;display:flex;gap:10px;align-items:center}
  .hero{position:relative;min-height:540px;display:flex;align-items:center;justify-content:center;
    text-align:center;color:#fff;overflow:hidden;background:#0f1620}
  .heroImg{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.04);
    background-image:url('https://d8j0ntlcm91z4.cloudfront.net/user_3FDtrg0wR4KXcm4Ea2lC8Affxbr/hf_20260626_085100_7687a277-062f-4732-abcf-45eadd729340.png')}
  .heroOverlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,13,22,.42) 0%,rgba(8,13,22,.5) 40%,rgba(8,13,22,.86) 100%)}
  .heroInner{position:relative;z-index:2;padding:54px 20px;max-width:860px;width:100%}
  .hero h1{margin:0 0 12px;font-size:44px;font-weight:800;letter-spacing:-.8px;line-height:1.1;text-shadow:0 2px 22px rgba(0,0,0,.4)}
  .hero p{margin:0 auto;font-size:18px;color:#e9eff7;max-width:700px;text-shadow:0 1px 12px rgba(0,0,0,.35)}
  .herocta{display:flex;gap:11px;justify-content:center;margin-top:22px;flex-wrap:wrap}
  .herocta button{border:none;cursor:pointer;font-size:15px;font-weight:700;padding:14px 26px;border-radius:12px;transition:.15s}
  .herocta .primary{background:var(--accent);color:#fff;box-shadow:0 10px 26px rgba(255,70,5,.36)}
  .herocta .primary:hover{filter:brightness(1.07);transform:translateY(-2px)}
  .herocta .ghost{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.4)}
  .herocta .ghost:hover{background:rgba(255,255,255,.2)}
  .herosearch{display:flex;gap:9px;max-width:580px;margin:24px auto 0}
  .herosearch input{flex:1;padding:15px 17px;border-radius:13px;border:none;font-size:15.5px;outline:none;box-shadow:0 8px 26px rgba(0,0,0,.28)}
  .herosearch button{background:var(--orange);color:#fff;border:none;width:56px;border-radius:13px;font-size:21px;cursor:pointer;box-shadow:0 8px 26px rgba(0,0,0,.28)}
  .herosearch button:hover{filter:brightness(.96)}
  .herofeat{margin-top:15px;font-size:13px;color:#e4edfb;opacity:.95}
  .herofeat a{cursor:pointer;border-bottom:1px dotted rgba(255,255,255,.6);text-decoration:none}
  /* price rating (mobile.de style) */
  .prate{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px;margin-top:5px;white-space:nowrap}
  .prate .pbar{display:flex;gap:2px}
  .prate .pbar i{width:7px;height:8px;border-radius:1px;background:currentColor;opacity:.28}
  .prate .pbar i.on{opacity:1}
  .prate.vg{background:#e3f6ec;color:#0f8c44}
  .prate.g{background:#eaf6e8;color:#3a9d2f}
  .prate.f{background:#eef1f6;color:#6c7a90}
  .prate.h{background:#fdeee4;color:#d2701a}
  .prate.op{background:#fdeaea;color:#d83a3f}
  /* pagination */
  .pager{display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center;margin:6px 0 16px}
  .pager button{min-width:38px;height:38px;padding:0 11px;border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
  .pager button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
  .pager button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .pager button:disabled{opacity:.4;cursor:default}
  .pager .pgdot{color:var(--mut);padding:0 2px}
  .pager .pginfo{margin-left:8px;font-size:13px;color:var(--mut);font-weight:600}
  .filtbtn{display:none;background:var(--card);border:1px solid var(--line);color:var(--ink);padding:10px 14px;
    border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-bottom:12px}
  .layout{max-width:1240px;margin:0 auto;padding:22px 24px 80px;display:grid;grid-template-columns:255px 1fr;gap:24px;align-items:start}
  .sidebar{position:sticky;top:78px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:11px;box-shadow:var(--shadow)}
  .sidebar input,.sidebar select{background:var(--card);border:1px solid var(--line);color:var(--ink);padding:9px 11px;border-radius:9px;font-size:13.5px;outline:none;width:100%}
  .sidebar input:focus,.sidebar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,111,235,.12)}
  .row2{display:flex;gap:9px}.row2 input{flex:1;min-width:0}
  .mainbar{margin-bottom:14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:16px}
  @media(max-width:860px){
    .layout{grid-template-columns:1fr;padding:16px 14px 70px;gap:14px}
    .sidebar{position:static;display:none}
    .sidebar.open{display:flex}
    .filtbtn{display:block}
    .bar{padding:11px 14px;gap:10px}
    .hero{min-height:300px}
    .hero h1{font-size:26px}
    .hero p{font-size:14.5px}
    .heroInner{padding:30px 16px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px}
    .name{font-size:14.5px}.bigprice{font-size:16px}
    .ov{padding:0}
    .modal{border-radius:0;min-height:100vh}
    .mbody{padding:18px 16px 26px}
    .mtitle{font-size:20px}
    .mspecs{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  }
  .empty{color:var(--mut);text-align:center;padding:60px;grid-column:1/-1}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;
    cursor:pointer;display:flex;flex-direction:column;opacity:0;transform:translateY(14px);
    animation:rise .45s cubic-bezier(.2,.8,.2,1) forwards;transition:transform .18s,box-shadow .18s}
  @keyframes rise{to{opacity:1;transform:none}}
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
  .ph{position:relative;aspect-ratio:16/10;background:#dfe5ee;overflow:hidden}
  .ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .5s,transform 6s ease-out}
  .ph img.show{opacity:1}
  .card:hover .ph img.show{transform:scale(1.07)}
  .ph .noimg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#9aa7b8;font-size:13px}
  .badge{position:absolute;top:11px;left:11px;z-index:3;background:var(--down);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px}
  .flag{position:absolute;top:11px;right:11px;z-index:3;font-size:11.5px;font-weight:700;background:rgba(255,255,255,.95);color:var(--ink);padding:4px 9px;border-radius:7px;display:flex;gap:6px;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.18)}
  .fdot{width:20px;height:13px;border-radius:2px;display:inline-block;border:1px solid rgba(0,0,0,.2);box-shadow:0 1px 2px rgba(0,0,0,.15);vertical-align:middle}
  .fdot.LV{background:linear-gradient(#9d1d36 0 38%,#fff 38% 62%,#9d1d36 62% 100%)}
  .fdot.LT{background:linear-gradient(#fdb913 0 33.34%,#006a44 33.34% 66.67%,#c1272d 66.67% 100%)}
  .fdot.EE{background:linear-gradient(#0072ce 0 33.34%,#000 33.34% 66.67%,#fff 66.67% 100%)}
  .dots{position:absolute;bottom:10px;right:11px;display:flex;gap:4px}
  .dots span{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.55)}
  .dots span.a{background:var(--card)}
  .body{padding:13px 15px 15px;display:flex;flex-direction:column;gap:7px}
  .name{font-weight:700;font-size:16px;display:flex;justify-content:space-between;gap:8px;align-items:baseline}
  .name .yr{color:var(--mut);font-weight:600;font-size:13px;flex:none}
  .specrow{color:var(--mut);font-size:12.5px;border-bottom:1px solid var(--line);padding-bottom:9px;min-height:1px}
  .cardfoot{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .bigprice{font-weight:800;font-size:18px;color:var(--ink)}
  .loc{font-size:11.5px;color:var(--mut);text-align:right;line-height:1.35}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(20,30,48,.5);backdrop-filter:blur(4px);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:28px;overflow:auto}
  .ov.show{display:flex;animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{position:relative;background:var(--card);border-radius:18px;max-width:900px;width:100%;box-shadow:0 24px 70px rgba(20,35,60,.3);overflow:hidden}
  .mgal{position:relative;aspect-ratio:16/9;background:#dfe5ee}
  .mgal img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
  .mgal img.show{display:block}
  .mgal .gnav{position:absolute;top:50%;transform:translateY(-50%);display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.95);color:var(--ink);border:none;font-size:34px;line-height:1;font-weight:700;width:60px;height:60px;border-radius:50%;cursor:pointer;box-shadow:0 6px 20px rgba(20,35,60,.35);z-index:3;transition:.15s}
  .mgal .gnav:hover{background:#fff;transform:translateY(-50%) scale(1.08)}
  .mgal .prev{left:16px}.mgal .next{right:16px}
  .mgal .cnt{position:absolute;bottom:12px;right:14px;background:rgba(20,30,48,.7);color:#fff;padding:4px 10px;border-radius:8px;font-size:13px}
  .mclose{position:absolute;top:14px;right:16px;background:rgba(255,255,255,.92);color:var(--ink);border:none;width:38px;height:38px;border-radius:50%;font-size:20px;cursor:pointer;z-index:3;box-shadow:var(--shadow)}
  .mbody{padding:22px 26px 28px}
  .mtop{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .mtitle{font-size:23px;font-weight:800}
  .mtitle span{color:var(--mut);font-weight:600;font-size:16px}
  .mprice{text-align:right}
  .mprice .v{font-size:24px;font-weight:800}
  .drop{font-size:13px;font-weight:700;margin-top:2px}
  .drop.dn{color:var(--down)}.drop.up{color:var(--up)}
  .mspecs{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin:18px 0}
  .mspec{background:var(--bg);border-radius:10px;padding:10px 13px;font-size:14px;font-weight:600}
  .mspec b{display:block;color:var(--mut);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
  .hist h3{font-size:15px;margin:6px 0 10px;display:flex;align-items:center;gap:8px}
  .spark{width:100%;height:150px;background:var(--bg);border-radius:12px;display:block}
  .htable{width:100%;border-collapse:collapse;margin-top:12px;font-size:13.5px}
  .htable td{padding:9px 6px;border-bottom:1px solid var(--line)}
  .htable td:last-child{text-align:right;color:var(--mut)}
  .htable .chg.dn{color:var(--down);font-weight:700}.htable .chg.up{color:var(--up);font-weight:700}
  .mlink{display:inline-block;margin-top:18px;color:#fff;background:var(--accent);font-size:13.5px;font-weight:600;text-decoration:none;padding:11px 18px;border-radius:10px}
  .mdesc{color:var(--ink);font-size:14px;line-height:1.65;white-space:pre-wrap;margin-top:14px;background:var(--card2);padding:14px 16px;border-radius:12px}
  .muted{color:var(--mut);font-size:13px}
  /* content sections */
  .wrap{max-width:1160px;margin:0 auto;padding:0 24px}
  .section{padding:48px 0}
  .section.alt{background:var(--card);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .secttl{font-size:27px;font-weight:800;letter-spacing:-.4px;margin:0 0 6px}
  .secsub{color:var(--mut);font-size:15px;margin:0 0 22px;max-width:760px}
  .chips2{display:flex;flex-wrap:wrap;gap:9px}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:9px 16px;font-size:14px;
    font-weight:600;cursor:pointer;transition:.15s;box-shadow:0 2px 8px rgba(20,35,60,.04)}
  .chip:hover{border-color:var(--gold);color:#9a7327;transform:translateY(-2px)}
  .article{font-size:15.5px;line-height:1.8;color:var(--ink);max-width:860px}
  .article h3{font-size:19px;color:var(--ink);margin:26px 0 8px}
  .article p{margin:0 0 14px}
  .pc{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:8px}
  @media(max-width:640px){.pc{grid-template-columns:1fr}}
  .pccard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;box-shadow:var(--shadow)}
  .pccard h4{margin:0 0 12px;font-size:16px;display:flex;align-items:center;gap:8px}
  .pccard ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:9px}
  .pccard li{font-size:14px;color:var(--mut);display:flex;gap:9px;align-items:flex-start;line-height:1.5}
  .pccard.pro li::before{content:"✓";color:var(--down);font-weight:800}
  .pccard.con li::before{content:"–";color:var(--orange);font-weight:800}
  .steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-top:8px}
  .step{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:var(--shadow);position:relative}
  .step .n{width:34px;height:34px;border-radius:50%;background:var(--dark);color:var(--gold);font-weight:800;
    display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:11px}
  .step h4{margin:0 0 5px;font-size:15.5px}
  .step p{margin:0;font-size:13.5px;color:var(--mut);line-height:1.55}
  .faq{max-width:860px}
  .qa{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
  .qa summary{cursor:pointer;padding:16px 20px;font-weight:700;font-size:15.5px;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:12px}
  .qa summary::-webkit-details-marker{display:none}
  .qa summary::after{content:"+";color:var(--gold);font-size:22px;font-weight:700;flex:none}
  .qa[open] summary::after{content:"–"}
  .qa .ans{padding:0 20px 18px;color:var(--mut);font-size:14.5px;line-height:1.7}
  footer{background:var(--dark);color:#aeb9c8;padding:40px 24px 30px;margin-top:10px}
  .foot{max-width:1160px;margin:0 auto;display:flex;flex-wrap:wrap;gap:24px;justify-content:space-between;align-items:flex-start}
  .foot .fb{font-size:13.5px;line-height:1.8;max-width:360px}
  .foot .fb b{color:#fff;font-size:16px}
  .foot a{color:var(--gold);text-decoration:none}
  .foot .src{font-size:12.5px;color:#7c8799}
  .cookie{position:fixed;bottom:0;left:0;right:0;z-index:70;background:var(--dark);color:#e4edfb;
    padding:14px 18px;display:none;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;box-shadow:0 -4px 22px rgba(0,0,0,.3)}
  .cookie.show{display:flex}
  .cookie span{font-size:13.5px;max-width:660px}
  .cookie button{border:none;cursor:pointer;font-weight:700;padding:9px 18px;border-radius:9px;font-size:13.5px}
  .cookie .acc{background:var(--accent);color:#fff}
  .cookie .dec{background:rgba(255,255,255,.14);color:#fff}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="logo" onclick="goHome()" title="BalticRadar"><svg class="ic" viewBox="0 0 24 24" fill="none"><path d="M3 17l5-5 4 3 7-8" stroke="#ff4605" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="19" cy="7" r="2" fill="#fff"/></svg>Baltic<b>Radar</b></div>
    <nav class="nav">
      <a onclick="scrollToEl('grid')" id="navList">Sludinājumi</a>
      <a onclick="scrollToEl('s-how')" id="navHow">Kā tas strādā</a>
      <a onclick="scrollToEl('s-faq')" id="navFaq">BUJ</a>
    </nav>
    <div class="topright">

function modelSeries(make,model){

  if(mk==="bmw"){
    let x=m.match(/^X\s?(\d)/i); if(x)return "X"+x[1];

    let c=m.match(/^([A-Z])\s?\d/i); if(c)return c[1].toUpperCase()+"-klase";

async function _pageRetry(off,flt){   // one 1000-row page (first_seen.desc, indexed) with retries on transient 500s
  const url=`${SB_URL}/rest/v1/v_listings?select=${LIST_COLS}&${flt?flt+"&":""}order=first_seen.desc`;
  for(let a=0;a<4;a++){
    try{const r=await fetch(url,{headers:{...SBH,Range:`${off}-${off+999}`},cache:"no-store"});
      if(r.ok){const rows=await r.json(); if(Array.isArray(rows)) return rows;}}catch(e){}
    await new Promise(r=>setTimeout(r,400));
  }
  return null;
}
// Fetch EVERY row matching the server-safe filters, so client-side filters (model-series, gearbox,
// body, fuel, engine, text search) find ALL matches across the whole brand, not just the newest 1000.
async function fetchAllFiltered(cap, seq){
  const flt=buildFilterPreds();
  const offs=[]; for(let off=0; off<(cap||25000); off+=1000) offs.push(off);
  const out=[]; const CONC=6;
  for(let i=0;i<offs.length;i+=CONC){
    if(seq!==undefined && seq!==_grSeq) return null;
    const res=await Promise.all(offs.slice(i,i+CONC).map(o=>_pageRetry(o,flt)));
    let anyFull=false;
    for(const rows of res){ if(rows&&rows.length){ out.push(...rows); if(rows.length>=1000) anyFull=true; } }
    if(!anyFull) break;   // reached the end of the result set
  }
  return out;
}

async function loadHistory(carId){

    let pts=(await r.json()).filter(p=>p.price!=null);

    // known price back to when the ad was placed (we can't know prices from before we first saw it).
    const _car=(allCars||[]).concat(sampleCars||[]).find(c=>c.car_id===carId);
    if(_car&&_car.posted&&pts.length&&new Date(_car.posted)<new Date(pts[0].ts)){
      pts=[{ts:_car.posted,price:pts[0].price,mileage:pts[0].mileage},...pts];
    }
    if(!pts.length){box.innerHTML=`<h3>${T().priceHist}</h3><div class="muted">${T().histOne}</div>`;return;}
    const first=pts[0],last=pts[pts.length-1];

      if(dp===0){lbl.textContent=ML().nochg;lbl.style.color="var(--mut)";}
      else{lbl.textContent=`${dp>0?'+':''}${eur(dp)} (${dp>0?'+':''}${dpct}%)`;lbl.style.color=dp<0?"var(--down)":"var(--up)";}}}
    const gpts=pts.length<2?[pts[0],Object.assign({},pts[0])]:pts;
    const dm=(last.mileage!=null&&first.mileage!=null)?last.mileage-first.mileage:null;
    const pcl=dp<0?"dn":dp>0?"up":"";
    const summary=pts.length<2?"":`<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin:2px 0 12px;font-size:13.5px;color:var(--mut)">
      <span>Kopš ${dt(first.ts)}:</span>

      const mp=prev&&p.mileage!=null&&prev.mileage!=null?p.mileage-prev.mileage:null;

      return `<tr><td>${dt(p.ts)}</td><td><b>${eur(p.price)}</b></td><td class="chg ${cl}">${ch!=null?sign+eur(ch):""}</td><td>${mtxt}</td></tr>`;}).join("");
    box.innerHTML=`<h3>Cenu un nobraukuma vēsture</h3>${summary}${sparkline(gpts)}<table class="htable">${rows}</table>`;
  }catch(e){box.innerHTML="";}
}

  const top=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]).slice(0,16);
  const chips=top.map(m=>`<span class="chip" onclick='pickMake(${JSON.stringify(m)})'>${m} <b style="color:var(--mut);font-weight:600">${counts[m]}</b></span>`).join("");
  const pros=c.pros.map(x=>`<li>${x}</li>`).join("");
  const cons=c.cons.map(x=>`<li>${x}</li>`).join("");
  const steps=c.steps.map((s,i)=>`<div class="step"><div class="n">${i+1}</div><h4>${s[0]}</h4><p>${s[1]}</p></div>`).join("");
  const faq=c.faq.map(f=>`<details class="qa"><summary>${f[0]}</summary><div class="ans">${f[1]}</div></details>`).join("");
  const about=c.about.map(p=>`<p>${p}</p>`).join("");
  document.getElementById("content").innerHTML=`
    ${chips?`<section class="section reveal"><div class="wrap"><h2 class="secttl">${c.makesT}</h2><p class="secsub">${c.makesS}</p><div class="chips2">${chips}</div></div></section>`:""}
    <section class="section reveal alt"><div class="wrap"><h2 class="secttl">${c.aboutT}</h2><div class="article">${about}</div>
      <h2 class="secttl" style="margin-top:38px">${c.pcT}</h2>

}
