<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BalticRadar</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>try{var _t=localStorage.getItem("br_theme")||"auto";var _e=_t==="auto"?(matchMedia("(prefers-color-scheme: light)").matches?"light":"dark"):_t;document.documentElement.setAttribute("data-theme",_e);}catch(_){}</script>
<style>
  :root{--bg:#0d1117;--card:#161b22;--card2:#1c232d;--ink:#e6edf3;--mut:#9aa6b2;--line:#262c36;
    --accent:#ff4605;--accent2:#ff6a32;--gold:#ff7a3c;--orange:#ff4605;--up:#ff6b6b;--down:#3fb950;
    --dark:#0a0e14;--dark2:#11161e;
    --lv:#c0314f;--lt:#f5b301;--ee:#2b9fe6;--shadow:0 8px 28px rgba(0,0,0,.45);}
  html[data-theme="light"]{--bg:#f2f5f9;--card:#ffffff;--card2:#eef2f7;--ink:#18202c;--mut:#5a6573;
    --line:#e1e7ee;--dark:#e7ecf3;--dark2:#dde4ee;--shadow:0 10px 30px rgba(30,55,95,.10);}
  html{transition:background .2s,color .2s}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.65 "Mulish",Arial,Helvetica,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .logo{cursor:pointer;transition:transform .15s,opacity .15s}
  .logo:hover{opacity:.88}.logo:active{transform:scale(.96)}
  button{transition:transform .12s,filter .15s,background .15s,border-color .15s,box-shadow .15s}
  button:active{transform:translateY(1px)}
  .reveal{opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s cubic-bezier(.2,.8,.2,1)}
  .reveal.in{opacity:1;transform:none}
  @keyframes slowzoom{from{transform:scale(1.04)}to{transform:scale(1.14)}}
  @media(prefers-reduced-motion:no-preference){.heroImg{animation:slowzoom 22s ease-in-out infinite alternate}}
  header{position:sticky;top:0;z-index:20;background:var(--dark);border-bottom:1px solid rgba(255,255,255,.08)}
  .bar{max-width:1240px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .logo{font-size:21px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:9px;color:#fff}
  .logo b{color:var(--gold)}
  .logo .ic{width:26px;height:26px}
  .nav{display:flex;gap:20px;margin-left:8px}
  .nav a{color:#cdd6e3;font-size:13.5px;font-weight:600;text-decoration:none;cursor:pointer;transition:.15s}
  .nav a:hover{color:#fff}
  @media(max-width:860px){.nav{display:none}}
  .status{font-size:13px;color:var(--mut);display:flex;align-items:center;gap:7px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--down);box-shadow:0 0 0 0 rgba(26,157,84,.6);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(26,157,84,.5)}70%{box-shadow:0 0 0 8px rgba(26,157,84,0)}100%{box-shadow:0 0 0 0 rgba(26,157,84,0)}}
  .pills{display:flex;flex-wrap:wrap;gap:6px}
  .pills button{background:var(--card);border:1px solid var(--line);color:var(--ink);padding:7px 12px;
    border-radius:22px;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;display:flex;align-items:center;gap:6px}
  .pills button:hover{border-color:#c5d0de}
  .pills button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .langsel{background:var(--card);border:1px solid var(--line);color:var(--ink);padding:7px 10px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;outline:none}
  .count{font-size:13px;color:var(--mut);font-weight:500}
  .notify{background:var(--orange);color:#fff;border:none;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
  .notify:hover{filter:brightness(.95)}
  #subform input,#subform select{background:var(--card);border:1px solid var(--line);color:var(--ink);padding:10px 12px;border-radius:9px;font-size:14px;outline:none;width:100%}
  #subform input:focus,#subform select:focus{border-color:var(--accent)}
  .controls{max-width:1240px;margin:0 auto;padding:0 24px 14px;display:flex;gap:10px;flex-wrap:wrap}
  .controls input,.controls select{background:var(--card);border:1px solid var(--line);color:var(--ink);
    padding:9px 12px;border-radius:10px;font-size:13.5px;outline:none;transition:.15s}
  .controls input:focus,.controls select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,111,235,.12)}
  .controls input[type=number]{width:100px}
  .controls .search{flex:1;min-width:180px}
  .topright{margin-left:auto;display:flex;gap:10px;align-items:center}
  .hero{position:relative;min-height:540px;display:flex;align-items:center;justify-content:center;
    text-align:center;color:#fff;overflow:hidden;background:#0f1620}
  .heroImg{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.04);
    background-image:url('https://d8j0ntlcm91z4.cloudfront.net/user_3FDtrg0wR4KXcm4Ea2lC8Affxbr/hf_20260626_085100_7687a277-062f-4732-abcf-45eadd729340.png')}
  .heroOverlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,13,22,.42) 0%,rgba(8,13,22,.5) 40%,rgba(8,13,22,.86) 100%)}
  .heroInner{position:relative;z-index:2;padding:54px 20px;max-width:860px;width:100%}
  .hero h1{margin:0 0 12px;font-size:44px;font-weight:800;letter-spacing:-.8px;line-height:1.1;text-shadow:0 2px 22px rgba(0,0,0,.4)}
  .hero p{margin:0 auto;font-size:18px;color:#e9eff7;max-width:700px;text-shadow:0 1px 12px rgba(0,0,0,.35)}
  .herocta{display:flex;gap:11px;justify-content:center;margin-top:22px;flex-wrap:wrap}
  .herocta button{border:none;cursor:pointer;font-size:15px;font-weight:700;padding:14px 26px;border-radius:12px;transition:.15s}
  .herocta .primary{background:var(--accent);color:#fff;box-shadow:0 10px 26px rgba(255,70,5,.36)}
  .herocta .primary:hover{filter:brightness(1.07);transform:translateY(-2px)}
  .herocta .ghost{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.4)}
  .herocta .ghost:hover{background:rgba(255,255,255,.2)}
  .herosearch{display:flex;gap:9px;max-width:580px;margin:24px auto 0}
  .herosearch input{flex:1;padding:15px 17px;border-radius:13px;border:none;font-size:15.5px;outline:none;box-shadow:0 8px 26px rgba(0,0,0,.28)}
  .herosearch button{background:var(--orange);color:#fff;border:none;width:56px;border-radius:13px;font-size:21px;cursor:pointer;box-shadow:0 8px 26px rgba(0,0,0,.28)}
  .herosearch button:hover{filter:brightness(.96)}
  .herofeat{margin-top:15px;font-size:13px;color:#e4edfb;opacity:.95}
  .herofeat a{cursor:pointer;border-bottom:1px dotted rgba(255,255,255,.6);text-decoration:none}
  /* price rating (mobile.de style) */
  .prate{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px;margin-top:5px;white-space:nowrap}
  .prate .pbar{display:flex;gap:2px}
  .prate .pbar i{width:7px;height:8px;border-radius:1px;background:currentColor;opacity:.28}
  .prate .pbar i.on{opacity:1}
  .prate.vg{background:#e3f6ec;color:#0f8c44}
  .prate.g{background:#eaf6e8;color:#3a9d2f}
  .prate.f{background:#eef1f6;color:#6c7a90}
  .prate.h{background:#fdeee4;color:#d2701a}
  .prate.op{background:#fdeaea;color:#d83a3f}
  /* pagination */
  .pager{display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center;margin:6px 0 16px}
  .pager button{min-width:38px;height:38px;padding:0 11px;border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
  .pager button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
  .pager button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .pager button:disabled{opacity:.4;cursor:default}
  .pager .pgdot{color:var(--mut);padding:0 2px}
  .pager .pginfo{margin-left:8px;font-size:13px;color:var(--mut);font-weight:600}
  .filtbtn{display:none;background:var(--card);border:1px solid var(--line);color:var(--ink);padding:10px 14px;
    border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-bottom:12px}
  .layout{max-width:1240px;margin:0 auto;padding:22px 24px 80px;display:grid;grid-template-columns:255px 1fr;gap:24px;align-items:start}
  .sidebar{position:sticky;top:78px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:11px;box-shadow:var(--shadow)}
  .sidebar input,.sidebar select{background:var(--card);border:1px solid var(--line);color:var(--ink);padding:9px 11px;border-radius:9px;font-size:13.5px;outline:none;width:100%}
  .sidebar input:focus,.sidebar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,111,235,.12)}
  .row2{display:flex;gap:9px}.row2 input{flex:1;min-width:0}
  .mainbar{margin-bottom:14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:16px}
  @media(max-width:860px){
    .layout{grid-template-columns:1fr;padding:16px 14px 70px;gap:14px}
    .sidebar{position:static;display:none}
    .sidebar.open{display:flex}
    .filtbtn{display:block}
    .bar{padding:11px 14px;gap:10px}
    .hero{min-height:300px}
    .hero h1{font-size:26px}
    .hero p{font-size:14.5px}
    .heroInner{padding:30px 16px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px}
    .name{font-size:14.5px}.bigprice{font-size:16px}
    .ov{padding:0}
    .modal{border-radius:0;min-height:100vh}
    .mbody{padding:18px 16px 26px}
    .mtitle{font-size:20px}
    .mspecs{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  }
  .empty{color:var(--mut);text-align:center;padding:60px;grid-column:1/-1}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;
    cursor:pointer;display:flex;flex-direction:column;opacity:0;transform:translateY(14px);
    animation:rise .45s cubic-bezier(.2,.8,.2,1) forwards;transition:transform .18s,box-shadow .18s}
  @keyframes rise{to{opacity:1;transform:none}}
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
  .ph{position:relative;aspect-ratio:16/10;background:#dfe5ee;overflow:hidden}
  .ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .5s,transform 6s ease-out}
  .ph img.show{opacity:1}
  .card:hover .ph img.show{transform:scale(1.07)}
  .ph .noimg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#9aa7b8;font-size:13px}
  .badge{position:absolute;top:11px;left:11px;z-index:3;background:var(--down);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px}
  .flag{position:absolute;top:11px;right:11px;z-index:3;font-size:11.5px;font-weight:700;background:rgba(255,255,255,.95);color:var(--ink);padding:4px 9px;border-radius:7px;display:flex;gap:6px;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.18)}
  .fdot{width:20px;height:13px;border-radius:2px;display:inline-block;border:1px solid rgba(0,0,0,.2);box-shadow:0 1px 2px rgba(0,0,0,.15);vertical-align:middle}
  .fdot.LV{background:linear-gradient(#9d1d36 0 38%,#fff 38% 62%,#9d1d36 62% 100%)}
  .fdot.LT{background:linear-gradient(#fdb913 0 33.34%,#006a44 33.34% 66.67%,#c1272d 66.67% 100%)}
  .fdot.EE{background:linear-gradient(#0072ce 0 33.34%,#000 33.34% 66.67%,#fff 66.67% 100%)}
  .dots{position:absolute;bottom:10px;right:11px;display:flex;gap:4px}
  .dots span{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.55)}
  .dots span.a{background:var(--card)}
  .body{padding:13px 15px 15px;display:flex;flex-direction:column;gap:7px}
  .name{font-weight:700;font-size:16px;display:flex;justify-content:space-between;gap:8px;align-items:baseline}
  .name .yr{color:var(--mut);font-weight:600;font-size:13px;flex:none}
  .specrow{color:var(--mut);font-size:12.5px;border-bottom:1px solid var(--line);padding-bottom:9px;min-height:1px}
  .cardfoot{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .bigprice{font-weight:800;font-size:18px;color:var(--ink)}
  .loc{font-size:11.5px;color:var(--mut);text-align:right;line-height:1.35}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(20,30,48,.5);backdrop-filter:blur(4px);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:28px;overflow:auto}
  .ov.show{display:flex;animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{position:relative;background:var(--card);border-radius:18px;max-width:900px;width:100%;box-shadow:0 24px 70px rgba(20,35,60,.3);overflow:hidden}
  .mgal{position:relative;aspect-ratio:16/9;background:#dfe5ee}
  .mgal img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
  .mgal img.show{display:block}
  .mgal .gnav{position:absolute;top:50%;transform:translateY(-50%);display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.95);color:var(--ink);border:none;font-size:34px;line-height:1;font-weight:700;width:60px;height:60px;border-radius:50%;cursor:pointer;box-shadow:0 6px 20px rgba(20,35,60,.35);z-index:3;transition:.15s}
  .mgal .gnav:hover{background:#fff;transform:translateY(-50%) scale(1.08)}
  .mgal .prev{left:16px}.mgal .next{right:16px}
  .mgal .cnt{position:absolute;bottom:12px;right:14px;background:rgba(20,30,48,.7);color:#fff;padding:4px 10px;border-radius:8px;font-size:13px}
  .mclose{position:absolute;top:14px;right:16px;background:rgba(255,255,255,.92);color:var(--ink);border:none;width:38px;height:38px;border-radius:50%;font-size:20px;cursor:pointer;z-index:3;box-shadow:var(--shadow)}
  .mbody{padding:22px 26px 28px}
  .mtop{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .mtitle{font-size:23px;font-weight:800}
  .mtitle span{color:var(--mut);font-weight:600;font-size:16px}
  .mprice{text-align:right}
  .mprice .v{font-size:24px;font-weight:800}
  .drop{font-size:13px;font-weight:700;margin-top:2px}
  .drop.dn{color:var(--down)}.drop.up{color:var(--up)}
  .mspecs{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin:18px 0}
  .mspec{background:var(--bg);border-radius:10px;padding:10px 13px;font-size:14px;font-weight:600}
  .mspec b{display:block;color:var(--mut);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
  .hist h3{font-size:15px;margin:6px 0 10px;display:flex;align-items:center;gap:8px}
  .spark{width:100%;height:150px;background:var(--bg);border-radius:12px;display:block}
  .htable{width:100%;border-collapse:collapse;margin-top:12px;font-size:13.5px}
  .htable td{padding:9px 6px;border-bottom:1px solid var(--line)}
  .htable td:last-child{text-align:right;color:var(--mut)}
  .htable .chg.dn{color:var(--down);font-weight:700}.htable .chg.up{color:var(--up);font-weight:700}
  .mlink{display:inline-block;margin-top:18px;color:#fff;background:var(--accent);font-size:13.5px;font-weight:600;text-decoration:none;padding:11px 18px;border-radius:10px}
  .mdesc{color:var(--ink);font-size:14px;line-height:1.65;white-space:pre-wrap;margin-top:14px;background:var(--card2);padding:14px 16px;border-radius:12px}
  .muted{color:var(--mut);font-size:13px}
  /* content sections */
  .wrap{max-width:1160px;margin:0 auto;padding:0 24px}
  .section{padding:48px 0}
  .section.alt{background:var(--card);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .secttl{font-size:27px;font-weight:800;letter-spacing:-.4px;margin:0 0 6px}
  .secsub{color:var(--mut);font-size:15px;margin:0 0 22px;max-width:760px}
  .chips2{display:flex;flex-wrap:wrap;gap:9px}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:9px 16px;font-size:14px;
    font-weight:600;cursor:pointer;transition:.15s;box-shadow:0 2px 8px rgba(20,35,60,.04)}
  .chip:hover{border-color:var(--gold);color:#9a7327;transform:translateY(-2px)}
  .article{font-size:15.5px;line-height:1.8;color:var(--ink);max-width:860px}
  .article h3{font-size:19px;color:var(--ink);margin:26px 0 8px}
  .article p{margin:0 0 14px}
  .pc{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:8px}
  @media(max-width:640px){.pc{grid-template-columns:1fr}}
  .pccard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;box-shadow:var(--shadow)}
  .pccard h4{margin:0 0 12px;font-size:16px;display:flex;align-items:center;gap:8px}
  .pccard ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:9px}
  .pccard li{font-size:14px;color:var(--mut);display:flex;gap:9px;align-items:flex-start;line-height:1.5}
  .pccard.pro li::before{content:"✓";color:var(--down);font-weight:800}
  .pccard.con li::before{content:"–";color:var(--orange);font-weight:800}
  .steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-top:8px}
  .step{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:var(--shadow);position:relative}
  .step .n{width:34px;height:34px;border-radius:50%;background:var(--dark);color:var(--gold);font-weight:800;
    display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:11px}
  .step h4{margin:0 0 5px;font-size:15.5px}
  .step p{margin:0;font-size:13.5px;color:var(--mut);line-height:1.55}
  .faq{max-width:860px}
  .qa{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
  .qa summary{cursor:pointer;padding:16px 20px;font-weight:700;font-size:15.5px;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:12px}
  .qa summary::-webkit-details-marker{display:none}
  .qa summary::after{content:"+";color:var(--gold);font-size:22px;font-weight:700;flex:none}
  .qa[open] summary::after{content:"–"}
  .qa .ans{padding:0 20px 18px;color:var(--mut);font-size:14.5px;line-height:1.7}
  footer{background:var(--dark);color:#aeb9c8;padding:40px 24px 30px;margin-top:10px}
  .foot{max-width:1160px;margin:0 auto;display:flex;flex-wrap:wrap;gap:24px;justify-content:space-between;align-items:flex-start}
  .foot .fb{font-size:13.5px;line-height:1.8;max-width:360px}
  .foot .fb b{color:#fff;font-size:16px}
  .foot a{color:var(--gold);text-decoration:none}
  .foot .src{font-size:12.5px;color:#7c8799}
  .cookie{position:fixed;bottom:0;left:0;right:0;z-index:70;background:var(--dark);color:#e4edfb;
    padding:14px 18px;display:none;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;box-shadow:0 -4px 22px rgba(0,0,0,.3)}
  .cookie.show{display:flex}
  .cookie span{font-size:13.5px;max-width:660px}
  .cookie button{border:none;cursor:pointer;font-weight:700;padding:9px 18px;border-radius:9px;font-size:13.5px}
  .cookie .acc{background:var(--accent);color:#fff}
  .cookie .dec{background:rgba(255,255,255,.14);color:#fff}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="logo" onclick="goHome()" title="BalticRadar"><svg class="ic" viewBox="0 0 24 24" fill="none"><path d="M3 17l5-5 4 3 7-8" stroke="#ff4605" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="19" cy="7" r="2" fill="#fff"/></svg>Baltic<b>Radar</b></div>
    <nav class="nav">
      <a onclick="scrollToEl('grid')" id="navList">Sludinājumi</a>
      <a onclick="scrollToEl('s-how')" id="navHow">Kā tas strādā</a>
      <a onclick="scrollToEl('s-faq')" id="navFaq">BUJ</a>
    </nav>
    <div class="topright">

/* ============================ PRICE RATING (market valuation) ============================
   The old rater was broken in three ways, which is why a 132k-km car could be flagged
   "too expensive" while a 192k-km car of the same year was a "great price":
     1. it rated against `sampleCars` - a ~1000-car browser SAMPLE (only ~25 BMW 320s),
        not the real market (1000+ BMW 320s);
     2. it lumped EVERY body type together - a coupe was priced against estates and
        sedans - and never normalised "coupe" vs "Kupeja" / "automatic" vs "Automātiskā",
        so the cohort was incoherent by construction;
     3. it DOUBLE-COUNTED mileage: it narrowed to a similar-mileage band and then ALSO
        shifted the median by mileage again, which punished low-mileage cars.

   New model (the mobile.de approach: compare against genuinely comparable listings,
   controlling for the things that actually drive value):
     - comparables = the WHOLE market for that make+model, pulled from the DB and cached;
     - cohort narrowed by NORMALISED body -> fuel -> gearbox (relaxing only if too thin);
     - expected price from a least-squares fit of  ln(price) ~ age + mileage, so age and
       mileage are each priced ONCE, from the market's own depreciation curve;
     - no badge at all when the data is too thin (a wrong badge is worse than none).
========================================================================================= */
const _COMP={};                      // "make|model" -> full market rows (cached)
async function compPool(make,model){
  const k=make+"|"+model;
  if(_COMP[k])return _COMP[k];
  try{
    const u=`${SB_URL}/rest/v1/v_listings?select=year,last_price,last_mileage,body,fuel,gearbox`
      +`&make=eq.${encodeURIComponent(make)}&model=eq.${encodeURIComponent(model)}`
      +`&last_price=gte.300&limit=800`;   // >=300: keep parse artefacts (1 EUR cars) out of the valuation
    const r=await fetch(u,{headers:SBH,cache:"no-store"});
    const rows=r.ok?await r.json():[];
    _COMP[k]=Array.isArray(rows)?rows:[];
  }catch(e){_COMP[k]=[];}
  return _COMP[k];
}
// least squares for ln(price) = b0 + b1*age + b2*(km/100k)
function _ols(rows){
  const S=[[0,0,0],[0,0,0],[0,0,0]],T=[0,0,0];
  for(const r of rows){const x=[1,r.a,r.m];
    for(let i=0;i<3;i++){T[i]+=x[i]*r.y;for(let j=0;j<3;j++)S[i][j]+=x[i]*x[j];}}
  const A=[[S[0][0],S[0][1],S[0][2],T[0]],[S[1][0],S[1][1],S[1][2],T[1]],[S[2][0],S[2][1],S[2][2],T[2]]];
  for(let i=0;i<3;i++){
    let p=i;for(let k=i+1;k<3;k++)if(Math.abs(A[k][i])>Math.abs(A[p][i]))p=k;
    if(Math.abs(A[p][i])<1e-9)return null;
    const t=A[i];A[i]=A[p];A[p]=t;
    for(let k=i+1;k<3;k++){const f=A[k][i]/A[i][i];for(let j=i;j<4;j++)A[k][j]-=f*A[i][j];}
  }
  const b=[0,0,0];
  for(let i=2;i>=0;i--){let s=A[i][3];for(let j=i+1;j<3;j++)s-=A[i][j]*b[j];b[i]=s/A[i][i];}
  return b.every(v=>isFinite(v))?b:null;
}
const MINCOMP=8;
function rateWithPool(c,pool){
  if(c.last_price==null||!pool||pool.length<MINCOMP)return null;
  // narrow by the attributes that actually move price - NORMALISED across sources
  const keep=(arr,fn,val)=>{if(!val)return arr;const t=arr.filter(x=>fn(x)===val);return t.length>=MINCOMP?t:arr;};
  let g=pool.filter(x=>x.last_price>0);
  g=keep(g,x=>norm("body",x.body),norm("body",c.body));
  g=keep(g,x=>norm("fuel",x.fuel),norm("fuel",c.fuel));
  g=keep(g,x=>norm("gear",x.gearbox),norm("gear",c.gearbox));
  if(g.length<MINCOMP)return null;
  const Y=new Date().getFullYear();
  let exp=null;
  let rows=g.filter(x=>x.last_price>0&&x.year&&x.last_mileage!=null)
            .map(x=>({a:Y-x.year,m:x.last_mileage/1e5,y:Math.log(x.last_price)}));
  if(rows.length>=MINCOMP&&c.year&&c.last_mileage!=null){
    // trim the extreme 5% at each end so one freak listing can't bend the curve
    const ys=rows.map(r=>r.y).sort((a,b)=>a-b);
    const lo=ys[Math.floor(ys.length*0.05)], hi=ys[Math.ceil(ys.length*0.95)-1];
    const tr=rows.filter(r=>r.y>=lo&&r.y<=hi); if(tr.length>=MINCOMP)rows=tr;
    const b=_ols(rows)||[0,0,0];
    // Clamp to economically possible depreciation. On a small, noisy cohort a free fit can
    // produce a POSITIVE mileage coefficient (more km -> dearer), which is what made the old
    // rater punish low-mileage cars. Older and higher-mileage must never raise the value.
    const b1=Math.min(-0.02,Math.max(-0.25,b[1]));     // per year of age
    const b2=Math.min(-0.03,Math.max(-0.45,b[2]));     // per 100k km
    // robust intercept (median residual) -> pins the market LEVEL without chasing outliers
    const b0=median(rows.map(r=>r.y-b1*r.a-b2*r.m));
    if(b0!=null)exp=Math.exp(b0+b1*(Y-c.year)+b2*(c.last_mileage/1e5));
  }
  if(!(exp>0)){const px=g.map(x=>x.last_price).filter(p=>p>0);if(px.length<MINCOMP)return null;exp=median(px);}
  if(!(exp>=300&&exp<=500000))return null;             // model blew up -> show nothing
  const dev=(c.last_price-exp)/exp;
  const k=dev<=-0.15?"vg":dev<=-0.05?"g":dev<0.05?"f":dev<0.15?"h":"op";
  return {k,label:(RATEL[lang]||RATEL.en)[k],exp:Math.round(exp),n:g.length};
}

async function paintRatings(cars){

      {headers:{...SBH,Range:`${from}-${to}`,Prefer:wantCount?"count=estimated":"count=none"},cache:"no-store"});
    if(!r.ok)throw new Error("sb "+r.status);
    const rows=await r.json();
    const tot=parseInt((r.headers.get("content-range")||"").split("/")[1]);
    return {rows:Array.isArray(rows)?rows:[], total:isNaN(tot)?null:tot};
  };
  try{ return await go(q); }
  catch(e){
    // SAFETY NET: if a sort ever exceeds the DB statement timeout (500), fall back to
    // the always-indexed first_seen sort rather than rendering an EMPTY grid.
    // With the composite indexes in balticradar_db_fix.sql this path is never taken.
    const safe=q.replace(/order=[^&]*/,"order=first_seen.desc");
    if(safe!==q){ try{ return await go(safe); }catch(_){} }
    throw e;
  }
}
async function sbCount(){   // shallow, safe filtered count (Range 0-0) -> never times out on deep offsets

    const t=parseInt((r.headers.get("content-range")||"").split("/")[1]); return isNaN(t)?null:t;}catch(e){return null;}
}
let _grSeq=0;
async function loadGrid(){
  const my=++_grSeq;
  try{
    if(clientOnlyActive()){
      const all=await fetchAllFiltered(25000,my);          // fetch the WHOLE filtered set -> all matches found
      if(all===null||my!==_grSeq)return;
      const refined=applyFilters(cleanRows(all));          // full client filters + sort
      allCars=refined;
      const totalPages=Math.max(1,Math.ceil(refined.length/PAGE_SIZE));
      if(curPage>totalPages)curPage=totalPages; if(curPage<1)curPage=1;
      const slice=refined.slice((curPage-1)*PAGE_SIZE,curPage*PAGE_SIZE);
      render(slice);loadPagePhotos(slice);
      paintPager(totalPages);setCount(refined.length);
    } else {
      const from=(curPage-1)*PAGE_SIZE, to=from+PAGE_SIZE-1;
      const {rows}=await sbPage(from,to,false);   // no count on the page fetch -> deep offsets never time out
      if(my!==_grSeq)return;
      let tot = serverFilterActive() ? await sbCount() : catalogTotal;
      if(my!==_grSeq)return;
      if(tot==null) tot=(from+rows.length)||1;
      const totalPages=Math.max(1,Math.ceil((tot||1)/PAGE_SIZE));
      if(curPage>totalPages&&curPage>1){curPage=totalPages;return loadGrid();}
      allCars=cleanRows(rows);
      render(allCars);loadPagePhotos(allCars);
      paintPager(totalPages);setCount(tot);
    }
  }catch(e){ /* transient network/DB blip: keep the current grid in place */ }
}

function sparkline(pts){
  if(pts.length<2)return"";
  const w=640,h=230,padL=64,padR=16,padT=16,padB=34;
  const ps=pts.map(p=>p.price).filter(x=>x!=null);
  const mn=Math.min(...ps),mx=Math.max(...ps),flat=mx===mn,rg=(mx-mn)||1;
  const X=i=>padL+(w-padL-padR)*i/(pts.length-1);
  const Y=v=>padT+(h-padT-padB)*(flat?0.5:(1-(v-mn)/rg));
  const line=pts.map((p,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(p.price).toFixed(1)}`).join(" ");
  const area=`M${X(0).toFixed(1)},${(h-padB).toFixed(1)} `+pts.map((p,i)=>`L${X(i).toFixed(1)},${Y(p.price).toFixed(1)}`).join(" ")+` L${X(pts.length-1).toFixed(1)},${(h-padB).toFixed(1)} Z`;
  const grid=[],ylab=[];
  if(flat){const y=Y(mn).toFixed(1);
    grid.push(`<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="var(--line)" stroke-width="1"/>`);
    ylab.push(`<text x="${padL-8}" y="${(+y+4).toFixed(1)}" text-anchor="end" font-size="11" fill="var(--mut)">${eur(mn)}</text>`);}
  else{const ny=4;for(let g=0;g<=ny;g++){const v=mn+rg*g/ny,y=Y(v).toFixed(1);
    grid.push(`<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="var(--line)" stroke-width="1"/>`);
    ylab.push(`<text x="${padL-8}" y="${(+y+4).toFixed(1)}" text-anchor="end" font-size="11" fill="var(--mut)">${eur(Math.round(v))}</text>`);}}
  const xlab=`<text x="${X(0).toFixed(1)}" y="${h-12}" text-anchor="start" font-size="11" fill="var(--mut)">${dt(pts[0].ts)}</text><text x="${X(pts.length-1).toFixed(1)}" y="${h-12}" text-anchor="end" font-size="11" fill="var(--mut)">${dt(pts[pts.length-1].ts)}</text>`;
  const dots=pts.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.price).toFixed(1)}" r="3.8" fill="var(--accent)" stroke="var(--card)" stroke-width="1.5"><title>${dt(p.ts)} · ${eur(p.price)}</title></circle>`).join("");
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;margin:8px 0 4px;overflow:visible">
    <defs><linearGradient id="g" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="var(--accent)" stop-opacity=".22"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
    ${grid.join("")}<path d="${area}" fill="url(#g)"/><path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${ylab.join("")}${xlab}</svg>`;
}

  + '<div class="br-inr">'

  /* --- sign in --- */

    + '<div class="br-msg" id="brM-signin"></div>'
    + '<button class="br-gbtn" onclick="BR.google()"><svg width="17" height="17" viewBox="0 0 48 48"><path fill="#4285F4" d="M45.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h11.8c-.5 2.7-2 5-4.4 6.6v5.5h7.1c4.1-3.8 6.6-9.4 6.6-16.1z"/><path fill="#34A853" d="M24 46c6 0 11-2 14.6-5.4l-7.1-5.5c-2 1.3-4.5 2.1-7.5 2.1-5.8 0-10.7-3.9-12.400-9.1H4.2v5.7C7.8 41.1 15.3 46 24 46z"/><path fill="#FBBC05" d="M11.6 28.1c-.3-.9-.5-1.9-.5-3.1s.2-2.2.5-3.1v-5.7H4.2C2.8 19.1 2 21.9 2 25s.8 5.9 2.2 8.7l7.4-5.6z"/><path fill="#EA4335" d="M24 11.9c3.3 0 6.2 1.1 8.5 3.3l6.3-6.3C35 5.3 30 3 24 3 15.3 3 7.8 8 4.2 16.3l7.4 5.7c1.7-5.2 6.6-10.1 12.4-10.1z"/></svg> Turpināt ar Google</button>'
    + '<div class="br-div">VAI</div>'
    + '<input class="br-inp" id="brSiEmail" type="email" placeholder="E-pasts" autocomplete="email">'
    + '<input class="br-inp" id="brSiPass" type="password" placeholder="Parole" autocomplete="current-password">'
    + '<button class="br-link" onclick="BR.view(\'forgot\')">Aizmirsi paroli?</button>'
    + '<button class="br-btn" id="brSiBtn" onclick="BR.signIn()">Pieslēgties</button>'
    + '<div class="br-alt">Nav konta? <a onclick="BR.view(\'signup\')">Reģistrēties</a></div>'
  + '</div>'

  /* --- sign up --- */
  + '<div class="br-view" id="brV-signup">'
    + '<div class="br-logo"><span class="m">B</span> BalticRadar</div>'
    + '<div class="br-tag">Izveido bezmaksas kontu.</div>'
    + '<div class="br-msg" id="brM-signup"></div>'
    + '<button class="br-gbtn" onclick="BR.google()"><svg width="17" height="17" viewBox="0 0 48 48"><path fill="#4285F4" d="M45.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h11.8c-.5 2.7-2 5-4.4 6.6v5.5h7.1c4.1-3.8 6.6-9.4 6.6-16.1z"/><path fill="#34A853" d="M24 46c6 0 11-2 14.6-5.4l-7.1-5.5c-2 1.3-4.5 2.1-7.5 2.1-5.8 0-10.7-3.9-12.4-9.1H4.2v5.7C7.8 41.1 15.3 46 24 46z"/><path fill="#FBBC05" d="M11.6 28.1c-.3-.9-.5-1.9-.5-3.1s.2-2.2.5-3.1v-5.7H4.2C2.8 19.1 2 21.9 2 25s.8 5.9 2.2 8.7l7.4-5.6z"/><path fill="#EA4335" d="M24 11.9c3.3 0 6.2 1.1 8.5 3.3l6.3-6.3C35 5.3 30 3 24 3 15.3 3 7.8 8 4.2 16.3l7.4 5.7c1.7-5.2 6.6-10.1 12.4-10.1z"/></svg> Turpināt ar Google</button>'
    + '<div class="br-div">VAI</div>'
    + '<input class="br-inp" id="brSuName" type="text" placeholder="Vārds" autocomplete="name">'
    + '<input class="br-inp" id="brSuEmail" type="email" placeholder="E-pasts" autocomplete="email">'
    + '<input class="br-inp" id="brSuPass" type="password" placeholder="Parole (vismaz 8 zīmes)" autocomplete="new-password">'
    + '<label class="br-chk"><input type="checkbox" id="brSuTc"><span>Piekrītu <a onclick="BR.view(\'tc\')">lietošanas noteikumiem</a> un privātuma politikai.</span></label>'
    + '<button class="br-btn" id="brSuBtn" onclick="BR.signUp()">Izveidot kontu</button>'
    + '<div class="br-alt">Jau ir konts? <a onclick="BR.view(\'signin\')">Pieslēgties</a></div>'
  + '</div>'

  /* --- check your email --- */
  + '<div class="br-view" id="brV-verify">'
    + '<div class="br-big">&#128231;</div>'
    + '<div class="br-h">Pārbaudi e-pastu</div>'
    + '<div class="br-tag">Nosūtījām apstiprinājuma saiti uz <b id="brVerifyEmail"></b>. Atver to, lai aktivizētu kontu.</div>'
    + '<button class="br-btn" onclick="BR.close()">Labi</button>'
    + '<div class="br-note">Nesaņēmi? Pārbaudi mēstuļu mapi.</div>'
  + '</div>'

  /* --- forgot --- */
  + '<div class="br-view" id="brV-forgot">'
    + '<div class="br-h">Atjaunot paroli</div>'
    + '<div class="br-tag">Ievadi e-pastu — nosūtīsim saiti paroles maiņai.</div>'
    + '<div class="br-msg" id="brM-forgot"></div>'
    + '<input class="br-inp" id="brFoEmail" type="email" placeholder="E-pasts" autocomplete="email">'
    + '<button class="br-btn" id="brFoBtn" onclick="BR.forgot()">Nosūtīt saiti</button>'
    + '<div class="br-alt"><a onclick="BR.view(\'signin\')">Atpakaļ</a></div>'
  + '</div>'

  /* --- set new password (after reset link, and from profile) --- */
  + '<div class="br-view" id="brV-reset">'
    + '<div class="br-h">Jauna parole</div>'
    + '<div class="br-tag">Izvēlies jaunu paroli savam kontam.</div>'
    + '<div class="br-msg" id="brM-reset"></div>'
    + '<input class="br-inp" id="brRsPass" type="password" placeholder="Jaunā parole (vismaz 8 zīmes)" autocomplete="new-password">'
    + '<input class="br-inp" id="brRsPass2" type="password" placeholder="Atkārto paroli" autocomplete="new-password">'
    + '<button class="br-btn" id="brRsBtn" onclick="BR.setPassword()">Saglabāt paroli</button>'
  + '</div>'

  /* --- T&C --- */
  + '<div class="br-view" id="brV-tc">'
    + '<div class="br-h">Lietošanas noteikumi</div>'
    + '<div class="br-tc">' + TC_HTML + '</div>'
    + '<button class="br-btn" onclick="BR.view(BR._back||\'signup\')">Aizvērt</button>'
  + '</div>'

  + '</div></div>';

  var host = document.createElement('div');
  host.innerHTML = html;
  document.body.appendChild(host);

  var $ = function(id){ return document.getElementById(id); };

  /* ---------------- view control ---------------- */
  BR._back = 'signup';
  BR.view = function(v){
    if(v==='tc'){ /* remember where we came from */ }
    else { BR._back = v; }
    ['signin','signup','verify','forgot','reset','tc'].forEach(function(k){
      var el = $('brV-'+k); if(el) el.classList.toggle('on', k===v);
    });
    $('brOv').classList.add('on');
    $('brModal').classList.add('on');
  };
  BR.openAuth = function(v){ BR.view(v||'signin'); };
  BR.close = function(){ $('brOv').classList.remove('on'); $('brModal').classList.remove('on'); };
  function msg(view, text, kind){
    var m = $('brM-'+view); if(!m) return;
    m.textContent = text || '';
    m.className = 'br-msg' + (text ? ' ' + (kind||'err') : '');
  }
  function busy(btnId, on, label){
    var b = $(btnId); if(!b) return;
    b.disabled = !!on;
    if(on){ b.dataset.lbl = b.textContent; b.textContent = 'Lūdzu uzgaidi…'; }
    else { b.textContent = label || b.dataset.lbl || b.textContent; }
  }

  /* ---------------- auth actions ---------------- */
  BR.signUp = async function(){
    var name = $('brSuName').value.trim();
    var email = $('brSuEmail').value.trim();
    var pass = $('brSuPass').value;
    var tc = $('brSuTc').checked;
    msg('signup','');
    if(!email || !pass){ return msg('signup','Ievadi e-pastu un paroli.'); }
    if(pass.length < 8){ return msg('signup','Parolei jābūt vismaz 8 zīmes garai.'); }
    if(!tc){ return msg('signup','Lūdzu piekrīti lietošanas noteikumiem.'); }
    busy('brSuBtn', true);
    var r = await supa.auth.signUp({
      email: email, password: pass,
      options:{ data:{ full_name:name, tc_accepted:'true' },
                emailRedirectTo: window.location.origin }
    });
    busy('brSuBtn', false, 'Izveidot kontu');
    if(r.error){ return msg('signup', r.error.message); }
    if(r.data.session){ BR.close(); return; }           // confirmations off -> logged straight in
    $('brVerifyEmail').textContent = email;
    BR.view('verify');
  };

  BR.signIn = async function(){
    var email = $('brSiEmail').value.trim();
    var pass = $('brSiPass').value;
    msg('signin','');
    if(!email || !pass){ return msg('signin','Ievadi e-pastu un paroli.'); }
    busy('brSiBtn', true);
    var r = await supa.auth.signInWithPassword({ email: email, password: pass });
    busy('brSiBtn', false, 'Pieslēgties');
    if(r.error){ return msg('signin', r.error.message); }
    BR.close();
  };

  // Flip to true ONLY after Google is enabled in Supabase > Auth > Providers.
  // While false the button is hidden, because signInWithOAuth navigates away and
  // Supabase renders its own raw JSON error page that JS cannot intercept.
  var GOOGLE_ENABLED = true;

  BR.google = async function(){
    if(!GOOGLE_ENABLED){
      msg('signin','Google pieslēgšanās vēl nav pieejama. Lūdzu izmanto e-pastu.','err');
      msg('signup','Google pieslēgšanās vēl nav pieejama. Lūdzu izmanto e-pastu.','err');
      return;
    }
    var r = await supa.auth.signInWithOAuth({
      provider:'google',
      options:{ redirectTo: window.location.origin }
    });
    if(r.error){
      msg('signin','Google pieslēgšanās neizdevās. Lūdzu izmanto e-pastu.','err');
      msg('signup','Google pieslēgšanās neizdevās. Lūdzu izmanto e-pastu.','err');
    }
  };

  function applyGoogleFlag(){
    if(GOOGLE_ENABLED) return;
    document.querySelectorAll('.br-gbtn').forEach(function(b){ b.style.display='none'; });

  }

  BR.forgot = async function(){
    var email = $('brFoEmail').value.trim();
    msg('forgot','');
    if(!email){ return msg('forgot','Ievadi e-pastu.'); }
    busy('brFoBtn', true);
    var r = await supa.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin });
    busy('brFoBtn', false, 'Nosūtīt saiti');
    if(r.error){ return msg('forgot', r.error.message); }
    msg('forgot','Ja konts pastāv, saite ir nosūtīta uz e-pastu.','ok');
  };

  BR.setPassword = async function(){
    var p1 = $('brRsPass').value, p2 = $('brRsPass2').value;
    msg('reset','');
    if(p1.length < 8){ return msg('reset','Parolei jābūt vismaz 8 zīmes garai.'); }
    if(p1 !== p2){ return msg('reset','Paroles nesakrīt.'); }
    busy('brRsBtn', true);
    var r = await supa.auth.updateUser({ password: p1 });
    busy('brRsBtn', false, 'Saglabāt paroli');
    if(r.error){ return msg('reset', r.error.message); }
    msg('reset','Parole nomainīta.','ok');
    setTimeout(BR.close, 1200);
  };

  BR.signOut = async function(){ await supa.auth.signOut(); location.reload(); };

  /* ---------------- header ---------------- */
  function mountHeader(){
    if($('brHdr')) return;
    var anchor = document.getElementById('notifyBtn');
    var hdr = document.createElement('span');
    hdr.className = 'br-hdr br-scope';
    hdr.id = 'brHdr';
    if(anchor && anchor.parentNode){ anchor.parentNode.insertBefore(hdr, anchor.nextSibling); }
    else { document.body.appendChild(hdr); hdr.style.cssText='position:fixed;top:14px;right:16px;z-index:9000'; }
    paintHeader();
  }
  function initials(){
    var n = (BR.profile && BR.profile.full_name) || (BR.user && BR.user.email) || '?';
    return n.trim().charAt(0).toUpperCase();
  }
  function paintHeader(){
    var hdr = $('brHdr'); if(!hdr) return;
    if(BR.user){
      hdr.innerHTML = '<button class="br-ava" id="brAva" title="Profils">'+initials()+'</button>'
                    + '<button class="br-pill" onclick="BR.signOut()">Iziet</button>';
      $('brAva').onclick = function(){
        if(window.BRProfile && window.BRProfile.open) window.BRProfile.open();   // Stage 2
        else BR.view('reset');
      };
    } else {
      hdr.innerHTML = '<button class="br-pill" onclick="BR.openAuth(\'signin\')">Pieslēgties</button>'
                    + '<button class="br-pill solid" onclick="BR.openAuth(\'signup\')">Reģistrēties</button>';
    }
  }
  BR.paintHeader = paintHeader;

  /* ---------------- session ---------------- */
  async function loadProfile(){
    if(!BR.user){ BR.profile = null; return; }
    var r = await supa.from('profiles').select('*').eq('id', BR.user.id).maybeSingle();
    BR.profile = r.data || null;
  }
  async function refresh(session){
    BR.user = session ? session.user : null;
    await loadProfile();
    paintHeader();
    document.body.classList.toggle('br-authed', !!BR.user);
    document.body.classList.toggle('br-premium', !!(BR.profile && BR.profile.is_premium));
    window.dispatchEvent(new CustomEvent('br:auth', { detail:{ user:BR.user, profile:BR.profile } }));
  }

  supa.auth.onAuthStateChange(function(event, session){
    if(event === 'PASSWORD_RECOVERY'){ BR.view('reset'); }
    refresh(session);
  });

  function boot(){
    mountHeader();
    applyGoogleFlag();
    supa.auth.getSession().then(function(r){ refresh(r.data.session); });

    // The old "Paziņojumi" button inserted straight into `subscriptions` with the
    // public key (no auth). That table is now RLS-locked. Require a login first.
    var oldOpenSub = window.openSub;
    window.openSub = function(){
      if(!BR.user){ return BR.openAuth('signup'); }
      if(typeof oldOpenSub === 'function') return oldOpenSub.apply(this, arguments);
    };
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();

<script>
(function(){
"use strict";
function ready(fn){ if(window.BR && window.BR.supa) fn(); else setTimeout(function(){ready(fn);},120); }
ready(function(){

var supa = BR.supa, $ = function(i){return document.getElementById(i);};
var esc = function(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});};
var nf = function(n){ return new Intl.NumberFormat('lv-LV').format(n); };
var eur = function(n){ return n==null?'—':nf(n)+' €'; };
var isPrem = function(){ return !!(BR.profile && BR.profile.is_premium); };

/* ================= make -> models, from the DB ================= */
var MODELCACHE = {};
var JUNK = /^(-kita-|kita|cits|other|-)$/i;
async function modelsFor(make){
  if(!make) return [];
  if(MODELCACHE[make]) return MODELCACHE[make];
  var r = await supa.from('v_listings').select('model').eq('make', make).limit(3000);
  if(r.error) return [];
  var set = {};
  (r.data||[]).forEach(function(x){
    var m = (x.model||'').trim();
    if(!m || JUNK.test(m)) return;
    var k = m.toLowerCase();
    if(!set[k]) set[k] = m;               // dedupe, case-insensitive
  });
  var out = Object.values(set).sort(function(a,b){
    return a.localeCompare(b, 'lv', {numeric:true});
  });
  MODELCACHE[make] = out;
  return out;
}

/* ================= typable preset comboboxes ================= */
var PRESETS = {
  price:  [0,500,1000,1500,2000,2500,3000,4000,5000,6000,7500,10000,12500,15000,20000,25000,30000,40000,50000,75000,100000],
  km:     [0,5000,10000,20000,30000,50000,75000,100000,125000,150000,200000,250000,300000],
  engine: [0.8,1.0,1.2,1.4,1.6,1.8,2.0,2.2,2.5,3.0,3.5,4.0,5.0],
  year:   (function(){ var a=[]; for(var y=2026;y>=1970;y--) a.push(y); return a; })()
};
var DLDONE = false;
function ensureDatalists(){
  if(DLDONE) return; DLDONE = true;
  var wrap = document.createElement('div');
  wrap.style.display='none';
  wrap.innerHTML = Object.keys(PRESETS).map(function(k){
    return '<datalist id="brdl-'+k+'">' + PRESETS[k].map(function(v){
      return '<option value="'+v+'">'+(k==='engine'? v+' l' : nf(v))+'</option>';
    }).join('') + '</datalist>';
  }).join('');
  document.body.appendChild(wrap);
}
/* Turn an existing <input type=number> into a typable combobox with presets.
   Keeps id + .value so the site's own query builder keeps working untouched. */
function comboise(id, kind){
  var el = $(id);
  if(!el || el.dataset.brCombo) return;
  ensureDatalists();
  el.setAttribute('list','brdl-'+kind);
  el.setAttribute('type','text');
  el.setAttribute('inputmode','decimal');
  el.setAttribute('autocomplete','off');
  el.dataset.brCombo = '1';
}

/* ================= MAIN SEARCH PANEL fixes ================= */
async function repaintMainModels(){
  var mk = $('make'), md = $('model');
  if(!mk || !md) return;
  var make = mk.value || '';
  var keep = md.value;
  var first = md.options[0] ? md.options[0].textContent : 'Visi modeļi';
  md.innerHTML = '<option value="">'+esc(first)+'</option>';
  if(!make){ md.value=''; return; }
  var list = await modelsFor(make);
  list.forEach(function(m){
    var o = document.createElement('option');
    o.value = m; o.textContent = m;
    md.appendChild(o);
  });
  md.value = list.indexOf(keep) !== -1 ? keep : '';
}
function wireMainPanel(){
  var mk = $('make');
  if(mk && !mk.dataset.brWired){
    mk.dataset.brWired = '1';
    mk.addEventListener('change', repaintMainModels);
    if(mk.value) repaintMainModels();
  }
  comboise('pmin','price');  comboise('pmax','price');
  comboise('mmin','km');     comboise('mmax','km');
  comboise('emin','engine'); comboise('emax','engine');
  comboise('ymin','year');   comboise('ymax','year');
}

/* ================= favourites (carried over) ================= */
var FAV = new Set(), PHOTO2ID = {};
var _fetch = window.fetch;
window.fetch = function(input){
  var url = (typeof input==='string') ? input : (input && input.url) || '';
  var p = _fetch.apply(this, arguments);
  if(url.indexOf('/rest/v1/v_listings') !== -1){
    p.then(function(r){ try{ r.clone().json().then(function(rows){
      if(!Array.isArray(rows)) return;
      rows.forEach(function(row){
        if(row && row.car_id && Array.isArray(row.photos))
          row.photos.forEach(function(u){ PHOTO2ID[u] = row.car_id; });
      });
      decorate();
    }).catch(function(){}); }catch(e){} }).catch(function(){});
  }
  return p;
};
async function loadFavs(){
  FAV = new Set();
  if(!BR.user) return;
  var r = await supa.from('favourites').select('car_id');
  if(!r.error && r.data) r.data.forEach(function(x){ FAV.add(x.car_id); });
}
BR.toggleFav = async function(id, btn){
  if(!BR.user) return BR.openAuth('signup');
  if(FAV.has(id)){ FAV.delete(id); if(btn) btn.classList.remove('on');
    await supa.from('favourites').delete().eq('user_id',BR.user.id).eq('car_id',id);
  } else { FAV.add(id); if(btn) btn.classList.add('on');
    await supa.from('favourites').insert({user_id:BR.user.id, car_id:id});
  }
};
var HEART = '<span class="o">♡</span><span class="f">♥</span>';
function decorate(){
  document.querySelectorAll('#grid .card').forEach(function(card){
    var img = card.querySelector('img'); if(!img) return;
    var id = PHOTO2ID[img.getAttribute('src')||img.dataset.src||''];
    if(!id) return;
    var b = card.querySelector('.br-heart');
    if(!b){
      b = document.createElement('button');
      b.className='br-heart'; b.innerHTML=HEART; b.title='Saglabāt';
      b.onclick=function(e){ e.stopPropagation(); e.preventDefault(); BR.toggleFav(b.dataset.cid,b); };
      card.appendChild(b);
    }
    b.dataset.cid = id;
    b.classList.toggle('on', FAV.has(id));
  });
}
new MutationObserver(function(){ decorate(); wireMainPanel(); })
  .observe(document.body,{childList:true,subtree:true});

/* ============ premium gate on the car modal's price history ============ */
var _open = window.openCarById;
if(typeof _open === 'function'){
  window.openCarById = function(id){
    var r = _open.apply(this, arguments);
    setTimeout(function(){ gateHistory(id); }, 800);
    return r;
  };
}
async function gateHistory(id){
  var card = $('pchgcard') || $('hist');
  if(card && !isPrem() && !card.dataset.brLocked){
    card.dataset.brLocked = '1';
    var box = document.createElement('div');
    box.className = 'lockbox br2';
    box.style.marginTop = '10px';
    box.innerHTML = '<div class="lockrows"><div class="lockrow"></div><div class="lockrow"></div>'
      + '<div class="lockrow"></div><div class="lockrow"></div><div class="lockrow"></div></div>'
      + '<div class="lockcta"><div class="ic">🔒</div><h4>Cenu un nobraukuma vēsture</h4>'
      + '<p>Redzi, kā mainījusies šī auto cena un nobraukums. Pieejams Premium plānā.</p>'
      + '<button class="btn" onclick="BRProfile.open(\'bill\')">Uzzināt vairāk</button></div>';
    card.style.display = 'none';
    card.parentNode.insertBefore(box, card);
  }
  if(card && isPrem()){
    card.style.display = '';
    var prev = card.previousElementSibling;
    if(prev && prev.classList.contains('lockbox')) prev.remove();
    addMileageHistory(id, card);
  }
}
async function addMileageHistory(id, card){
  if(card.querySelector('.br-mileage')) return;
  var r = await supa.from('price_history').select('ts,price,mileage').eq('car_id', id).order('ts',{ascending:true});
  if(r.error || !r.data || !r.data.length) return;
  var pts = r.data.filter(function(x){ return x.mileage != null; });
  if(pts.length < 2) return;
  var d = document.createElement('div');
  d.className = 'br-mileage br2';
  d.style.cssText='margin-top:10px;font-family:Manrope,sans-serif;font-size:12.5px;font-weight:600';
  d.innerHTML = '<div style="color:#86868b;font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">'
    + 'Nobraukuma vēsture</div>'
    + pts.map(function(p){ return String(p.ts).slice(0,10)+' · '+nf(p.mileage)+' km'; }).join('<br>');
  card.appendChild(d);
}

/* ================= PROFILE PANEL ================= */
var TC = '<h4>1. Par pakalpojumu</h4>BalticRadar apkopo publiski pieejamus sludinājumus. Mēs neesam pārdevējs vai darījuma puse.'

 + '<h4>8. Izmaiņas</h4>Noteikumi var tikt mainīti.';

var host = document.createElement('div');
host.innerHTML =
  '<div class="br2ov" id="br2ov" onclick="BRProfile.close()"></div>'
+ '<div class="br2p br2" id="br2p" role="dialog">'

var BRProfile = window.BRProfile = {};
var PICKED = [];      // chosen models (chips)
var EDIT_ID = null;

BRProfile.open = function(tab){
  if(!BR.user) return BR.openAuth('signin');
  $('br2ov').classList.add('on'); $('br2p').classList.add('on');
  document.body.style.overflow='hidden';
  fillAcct();
  BRProfile.tab(tab||'acct');
};
BRProfile.close = function(){
  $('br2ov').classList.remove('on'); $('br2p').classList.remove('on');
  document.body.style.overflow='';
};
BRProfile.tab = function(t){
  ['acct','favs','filters','bill','tc'].forEach(function(k){
    var v=$('br2v-'+k); if(v) v.classList.toggle('on', k===t);
  });
  document.querySelectorAll('.br2tab').forEach(function(b){ b.classList.toggle('on', b.dataset.t===t); });
  if(t==='favs') renderFavs();
  if(t==='filters') renderFiltersHome();
};
document.querySelectorAll('.br2tab').forEach(function(b){ b.onclick=function(){ BRProfile.tab(b.dataset.t); }; });

function m(id,text,kind){ var e=$(id); if(!e) return;
  e.textContent=text||''; e.className='br2msg'+(text?' '+(kind||'err'):''); }

/* ---- account ---- */
function fillAcct(){
  if(!$('br2Email')) return;
  $('br2Email').value = (BR.user&&BR.user.email)||'';
  $('br2Name').value  = (BR.profile&&BR.profile.full_name)||'';
  var txt = isPrem() ? '⭐ Premium' : 'Bezmaksas plāns';
  $('br2Plan').textContent = txt;
  if($('br2Plan2')) $('br2Plan2').textContent = txt;
}
BRProfile.saveAcct = async function(){
  m('br2m-acct','');
  var r = await supa.from('profiles').update({full_name:$('br2Name').value.trim(), updated_at:new Date().toISOString()})
    .eq('id',BR.user.id).select().maybeSingle();
  if(r.error) return m('br2m-acct', r.error.message);
  BR.profile = r.data||BR.profile;
  if(BR.paintHeader) BR.paintHeader();
  m('br2m-acct','Saglabāts.','ok');
};
BRProfile.changePw = async function(){
  m('br2m-pw','');
  var a=$('br2Pw1').value, b=$('br2Pw2').value;
  if(a.length<8) return m('br2m-pw','Parolei jābūt vismaz 8 zīmes garai.');
  if(a!==b) return m('br2m-pw','Paroles nesakrīt.');
  var r = await supa.auth.updateUser({password:a});
  if(r.error) return m('br2m-pw', r.error.message);
  $('br2Pw1').value=''; $('br2Pw2').value='';
  m('br2m-pw','Parole nomainīta.','ok');
};

/* ---- favourites ---- */
async function renderFavs(){
  var box=$('br2FavBox'); if(!box) return;
  await loadFavs();
  if($('br2favN')) $('br2favN').textContent = FAV.size? '('+FAV.size+')':'';
  if(!FAV.size){ box.innerHTML='<div class="br2empty"><span class="e">♡</span>Nav saglabātu auto.<br>Nospied sirsniņu uz sludinājuma.</div>'; return; }
  box.innerHTML='<div class="br2empty">Ielādē…</div>';
  var r = await supa.from('v_listings')
    .select('car_id,make,model,year,last_price,last_mileage,fuel,photos').in('car_id',[...FAV]);
  if(r.error){ box.innerHTML='<div class="br2empty">Kļūda</div>'; return; }
  box.innerHTML = cardsHtml(r.data||[], true);
}
function cardsHtml(rows, rm){
  if(!rows.length) return '<div class="br2empty">Nav rezultātu.</div>';
  return '<div class="br2cards">' + rows.map(function(c){
    return '<div class="br2c" onclick="BRProfile.openCar(\''+esc(c.car_id)+'\')">'
      + ((c.photos&&c.photos[0]) ? '<img src="'+esc(c.photos[0])+'" loading="lazy">' : '<img>')
      + (rm ? '<button class="rm" onclick="event.stopPropagation();BRProfile.unfav(\''+esc(c.car_id)+'\')">✕</button>' : '')
      + '<div class="cb"><div class="t">'+esc(c.make)+' '+esc(c.model)+'</div>'
      + '<div class="m">'+esc(c.year||'')+' · '+(c.last_mileage!=null?nf(c.last_mileage)+' km':'—')+' · '+esc(c.fuel||'')+'</div>'
      + '<div class="p">'+eur(c.last_price)+'</div></div></div>';
  }).join('') + '</div>';
}
BRProfile.unfav = async function(id){
  FAV.delete(id);
  await supa.from('favourites').delete().eq('user_id',BR.user.id).eq('car_id',id);
  renderFavs(); decorate();
};
BRProfile.openCar = function(id){
  BRProfile.close();
  if(typeof window.openCarById==='function') window.openCarById(id);
};

/* ================= MY FILTERS ================= */
function lockHtml(title, body){
  return '<div class="lockbox">'
   + '<div class="lockrows"><div class="lockrow"></div><div class="lockrow"></div><div class="lockrow"></div>'
   + '<div class="lockrow"></div><div class="lockrow"></div></div>'
   + '<div class="lockcta"><div class="ic">🔒</div><h4>'+title+'</h4><p>'+body+'</p>'
   + '<button class="btn" onclick="BRProfile.tab(\'bill\')">Uzzināt vairāk</button></div></div>';
}

async function renderFiltersHome(){
  var w = $('br2FltWrap'); if(!w) return;

  if(!isPrem()){
    w.innerHTML = lockHtml('Saglabātie filtri ir Premium funkcija',
      'Izveido filtrus un saņem e-pasta paziņojumus, tiklīdz parādās atbilstošs auto. Pieejams Premium plānā.');
    if($('br2fltN')) $('br2fltN').textContent='';
    return;
  }

  var r = await supa.from('saved_filters').select('*').order('created_at',{ascending:false});
  if(r.error){ w.innerHTML='<div class="br2empty">Kļūda: '+esc(r.error.message)+'</div>'; return; }
  var rows = r.data||[];
  if($('br2fltN')) $('br2fltN').textContent = rows.length? '('+rows.length+')':'';

  w.innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
    + '<div style="font-weight:800;font-size:15px">Mani filtri</div>'
    + '<button class="br2btn g" onclick="BRProfile.newFilter()">+ Izveidot filtru</button></div>'
    + '<div id="br2FltForm"></div>'
    + '<div id="br2FltList">' + (rows.length
        ? rows.map(filterRow).join('')
        : '<div class="br2empty"><span class="e">🔍</span>Nav saglabātu filtru.<br>Nospied “Izveidot filtru”.</div>')
      + '</div>';
}
function filterRow(f){
  var c = f.criteria||{};
  return '<div class="br2f" onclick="BRProfile.runFilter('+f.id+')">'
    + '<div><div class="n">'+esc(f.name)
    + (f.notify_email?' <span style="color:#16a06a;font-size:11px;font-weight:700">● paziņojumi</span>':'')
    + '</div><div class="c">'+esc(describe(c))+'</div></div>'
    + '<div class="acts">'
    + '<button onclick="event.stopPropagation();BRProfile.runFilter('+f.id+')">Skatīt</button>'
    + '<button onclick="event.stopPropagation();BRProfile.editFilter('+f.id+')">Labot</button>'
    + '<button class="del" onclick="event.stopPropagation();BRProfile.delFilter('+f.id+')">Dzēst</button>'
    + '</div></div>';
}
function describe(c){
  var p=[];
  if(c.country) p.push(c.country);
  if(c.make) p.push(c.make);
  if(c.models&&c.models.length) p.push(c.models.join(', '));
  if(c.body) p.push(c.body);
  if(c.fuel) p.push(c.fuel);
  if(c.gearbox) p.push(c.gearbox);
  if(c.drivetrain) p.push(c.drivetrain);
  if(c.price_min!=null||c.price_max!=null) p.push((c.price_min!=null?nf(c.price_min):'0')+'–'+(c.price_max!=null?nf(c.price_max):'∞')+' €');
  if(c.year_min!=null||c.year_max!=null) p.push((c.year_min||'')+'–'+(c.year_max||''));
  if(c.km_min!=null||c.km_max!=null) p.push((c.km_min!=null?nf(c.km_min):0)+'–'+(c.km_max!=null?nf(c.km_max):'∞')+' km');
  if(c.eng_min!=null||c.eng_max!=null) p.push((c.eng_min||'')+'–'+(c.eng_max||'')+' l');
  return p.length? p.join(' · ') : 'Visi auto';
}

/* ---- the form ---- */
function selOpts(id, label){
  var src = document.getElementById(id);
  var out = '<option value="">'+label+'</option>';
  if(!src) return out;
  var seen={};
  [...src.options].forEach(function(o){
    var v=(o.value||'').trim(); if(!v) return;
    var k=v.toLowerCase(); if(seen[k]) return; seen[k]=1;
    out += '<option value="'+esc(v)+'">'+esc(o.textContent.trim())+'</option>';
  });
  return out;
}
function combo(id, kind, ph){
  return '<input class="br2i" id="'+id+'" list="brdl-'+kind+'" inputmode="decimal" autocomplete="off" placeholder="'+ph+'">';
}
BRProfile.newFilter = function(){ EDIT_ID=null; PICKED=[]; showForm(); };
BRProfile.editFilter = async function(id){
  var r = await supa.from('saved_filters').select('*').eq('id',id).maybeSingle();
  if(r.error||!r.data) return;
  EDIT_ID = id;
  var c = r.data.criteria||{};
  PICKED = (c.models||[]).slice();
  showForm(r.data.name, c, r.data.notify_email);
};

  c = c||{};
  var box = $('br2FltForm'); if(!box) return;
  box.innerHTML =
    '<div class="br2sec" id="br2FormSec">'
    + '<button class="br2back" onclick="BRProfile.cancelForm()">← Atpakaļ uz filtriem</button>'
    + '<h3>'+(EDIT_ID?'Labot filtru':'Jauns filtrs')+'</h3>'
    + '<div class="s">Marka un modelis ir obligāti. Pārējie lauki nav obligāti.</div>'
    + '<div class="br2msg" id="br2m-flt"></div>'
    + '<label class="br2l">Nosaukums</label><input class="br2i" id="f_name" placeholder="Piem. Lēts dīzeļa universālis">'
    + '<div class="br2row3">'
    +  '<div><label class="br2l">Valsts</label><select class="br2s" id="f_country">'
    +    '<option value="">Visas</option><option value="LV">LV</option><option value="LT">LT</option><option value="EE">EE</option></select></div>'
    +  '<div><label class="br2l">Marka *</label><select class="br2s" id="f_make">'+selOpts('make','Izvēlies marku')+'</select></div>'
    +  '<div><label class="br2l">Virsbūve</label><select class="br2s" id="f_body">'+selOpts('bodyf','Visas')+'</select></div>'
    + '</div>'
    + '<label class="br2l">Modeļi *</label>'
    + '<div class="br2chipbox">'
    +  '<div class="br2picked" id="f_picked"></div>'
    +  '<div class="br2chips" id="f_chips"><div class="br2hint">Vispirms izvēlies marku.</div></div>'
    +  '<div style="margin-top:10px"><button class="br2btn g" id="f_confirm" onclick="BRProfile.confirmModels()">Apstiprināt modeļus</button></div>'
    + '</div>'
    + '<div class="br2row3">'
    +  '<div><label class="br2l">Degviela</label><select class="br2s" id="f_fuel">'+selOpts('fuel','Visas')+'</select></div>'
    +  '<div><label class="br2l">Ātrumkārba</label><select class="br2s" id="f_gear">'+selOpts('gear','Visas')+'</select></div>'
    +  '<div><label class="br2l">Piedziņa</label><select class="br2s" id="f_drive">'+selOpts('drive','Visas')+'</select></div>'
    + '</div>'
    + '<div class="br2row"><div><label class="br2l">Cena no</label>'+combo('f_pmin','price','0')+'</div>'
    +  '<div><label class="br2l">Cena līdz</label>'+combo('f_pmax','price','—')+'</div></div>'
    + '<div class="br2row"><div><label class="br2l">Gads no</label>'+combo('f_ymin','year','—')+'</div>'
    +  '<div><label class="br2l">Gads līdz</label>'+combo('f_ymax','year','—')+'</div></div>'
    + '<div class="br2row"><div><label class="br2l">Nobraukums no</label>'+combo('f_mmin','km','0')+'</div>'
    +  '<div><label class="br2l">Nobraukums līdz</label>'+combo('f_mmax','km','—')+'</div></div>'
    + '<div class="br2row"><div><label class="br2l">Tilpums no</label>'+combo('f_emin','engine','—')+'</div>'
    +  '<div><label class="br2l">Tilpums līdz</label>'+combo('f_emax','engine','—')+'</div></div>'
    + '<label class="br2l">Paziņojumi</label><select class="br2s" id="f_notify">'
    +  '<option value="1">Ieslēgti</option><option value="0">Izslēgti</option></select>'
    + '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">'
    +  '<button class="br2btn g" onclick="BRProfile.saveFilter()">Saglabāt filtru</button>'
    +  '<button class="br2btn o" onclick="BRProfile.cancelForm()">Atcelt</button>'
    + '</div></div>';

  var list = $('br2FltList'); if(list) list.style.display='none';

  // prefill
  if(name) $('f_name').value = name;
  ['country','body','fuel','gear','drive'].forEach(function(k){
    var map = {country:'country', body:'body', fuel:'fuel', gear:'gearbox', drive:'drivetrain'};
    var el = $('f_'+k); if(el && c[map[k]]) el.value = c[map[k]];
  });
  [['f_pmin','price_min'],['f_pmax','price_max'],['f_ymin','year_min'],['f_ymax','year_max'],
   ['f_mmin','km_min'],['f_mmax','km_max'],['f_emin','eng_min'],['f_emax','eng_max']].forEach(function(p){
    if(c[p[1]] != null) $(p[0]).value = c[p[1]];
  });

  var fm = $('f_make');
  fm.onchange = function(){ PICKED = []; paintChips(); };

async function paintChips(){
  var make = $('f_make') ? $('f_make').value : '';
  var chips = $('f_chips');
  if(!chips) return;
  if(!make){
    chips.innerHTML = '<div class="br2hint">Vispirms izvēlies marku.</div>';
    paintPicked(); return;
  }
  chips.innerHTML = '<div class="br2hint">Ielādē modeļus…</div>';
  var list = await modelsFor(make);
  if(!list.length){ chips.innerHTML='<div class="br2hint">Šai markai nav modeļu.</div>'; return; }
  chips.innerHTML = list.map(function(mm){
    var on = PICKED.indexOf(mm)!==-1;
    return '<button type="button" class="br2chip'+(on?' on':'')+'" data-m="'+esc(mm)+'">'+esc(mm)+'</button>';
  }).join('');
  chips.querySelectorAll('.br2chip').forEach(function(b){
    b.onclick = function(){
      var v = b.dataset.m;
      var i = PICKED.indexOf(v);
      if(i===-1) PICKED.push(v); else PICKED.splice(i,1);
      b.classList.toggle('on', PICKED.indexOf(v)!==-1);
    };
  });
  paintPicked();
}
function paintPicked(){
  var p = $('f_picked'); if(!p) return;
  p.innerHTML = PICKED.length
    ? PICKED.map(function(mm){ return '<span class="br2pick">'+esc(mm)
        +'<b onclick="BRProfile.dropModel(\''+esc(mm)+'\')">✕</b></span>'; }).join('')
    : '';
}
BRProfile.dropModel = function(mm){
  var i=PICKED.indexOf(mm); if(i!==-1) PICKED.splice(i,1);
  paintPicked();
  var c=$('f_chips'); if(c){ var b=c.querySelector('.br2chip[data-m="'+CSS.escape(mm)+'"]'); if(b) b.classList.remove('on'); }
};
BRProfile.confirmModels = function(){
  paintPicked();
  m('br2m-flt', PICKED.length ? ('Izvēlēti '+PICKED.length+' modeļi.') : 'Nav izvēlēts neviens modelis.', PICKED.length?'ok':'err');
};
BRProfile.cancelForm = function(){
  $('br2FltForm').innerHTML='';
  var l=$('br2FltList'); if(l) l.style.display='';
  EDIT_ID=null; PICKED=[];
};
function num(id){ var v=($(id).value||'').replace(/\s/g,'').replace(',','.'); return v===''?null:(isNaN(Number(v))?null:Number(v)); }
BRProfile.saveFilter = async function(){
  m('br2m-flt','');
  var make = $('f_make').value;
  if(!make) return m('br2m-flt','Marka ir obligāta.');
  if(!PICKED.length) return m('br2m-flt','Jāizvēlas vismaz viens modelis.');
  var crit = {
    country:$('f_country').value||null, make:make, models:PICKED.slice(),
    body:$('f_body').value||null, fuel:$('f_fuel').value||null,
    gearbox:$('f_gear').value||null, drivetrain:$('f_drive').value||null,
    price_min:num('f_pmin'), price_max:num('f_pmax'),
    year_min:num('f_ymin'),  year_max:num('f_ymax'),
    km_min:num('f_mmin'),    km_max:num('f_mmax'),
    eng_min:num('f_emin'),   eng_max:num('f_emax')
  };
  var payload = { user_id:BR.user.id, name:($('f_name').value.trim() || (make+' '+PICKED.join(', ')).slice(0,60)),
    criteria:crit, notify_email:$('f_notify').value==='1', updated_at:new Date().toISOString() };
  var r = EDIT_ID
    ? await supa.from('saved_filters').update(payload).eq('id',EDIT_ID).select()
    : await supa.from('saved_filters').insert(payload).select();
  if(r.error) return m('br2m-flt', r.error.message);
  BRProfile.cancelForm();
  renderFiltersHome();
};
BRProfile.delFilter = async function(id){
  await supa.from('saved_filters').delete().eq('id',id);
  renderFiltersHome();
};

/* ---- run a saved filter: show matching cars ---- */
BRProfile.runFilter = async function(id){
  var w = $('br2FltWrap');
  var r = await supa.from('saved_filters').select('*').eq('id',id).maybeSingle();
  if(r.error||!r.data) return;
  var f = r.data, c = f.criteria||{};
  w.innerHTML = '<button class="br2back" onclick="BRProfile.tab(\'filters\')">← Atpakaļ uz filtriem</button>'
    + '<div style="font-weight:800;font-size:17px;margin-bottom:3px">'+esc(f.name)+'</div>'
    + '<div style="font-size:12px;color:#86868b;font-weight:500;margin-bottom:16px">'+esc(describe(c))+'</div>'
    + '<div id="br2Res"><div class="br2empty">Meklē…</div></div>';

  var q = supa.from('v_listings')
    .select('car_id,make,model,year,last_price,last_mileage,fuel,photos')
    .eq('make', c.make);
  if(c.models && c.models.length) q = q.in('model', c.models);
  if(c.country)    q = q.eq('country', c.country);
  if(c.body)       q = q.eq('body', c.body);
  if(c.fuel)       q = q.eq('fuel', c.fuel);
  if(c.gearbox)    q = q.eq('gearbox', c.gearbox);
  if(c.drivetrain) q = q.eq('drivetrain', c.drivetrain);
  if(c.price_min!=null) q = q.gte('last_price', c.price_min);
  if(c.price_max!=null) q = q.lte('last_price', c.price_max);
  if(c.year_min!=null)  q = q.gte('year', c.year_min);
  if(c.year_max!=null)  q = q.lte('year', c.year_max);
  if(c.km_min!=null)    q = q.gte('last_mileage', c.km_min);
  if(c.km_max!=null)    q = q.lte('last_mileage', c.km_max);
  var res = await q.order('last_price',{ascending:true}).limit(60);

  var box = $('br2Res'); if(!box) return;
  if(res.error){ box.innerHTML='<div class="br2empty">Kļūda: '+esc(res.error.message)+'</div>'; return; }
  var rows = res.data||[];
  box.innerHTML = '<div style="font-size:12.5px;font-weight:700;color:#86868b;margin-bottom:12px">'
    + rows.length + ' atbilstoši auto</div>' + cardsHtml(rows, false);
};
