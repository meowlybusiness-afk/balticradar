name: BalticRadar collect (ss.lv)

# ss.lv only - direct + free, no proxy. Runs every 5 min in GitHub's cloud; PC can be OFF.
on:
  schedule:
    - cron: "*/5 * * * *"     # every 5 min (GitHub min; may be delayed under load)
  workflow_dispatch: {}        # also runnable manually from the Actions tab

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Collect ss.lv -> Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SS_PAGES: "10"        # ss.lv is direct + free, scan plenty
          SKIP_LTEE: "1"        # autoplius/auto24 handled by the separate proxied workflow
          BACKFILL: "100"       # ss.lv date backfill (free)
        run: python run_all.py
      # Alert emails are sent by the separate notify.yml workflow (twice a day digest).
