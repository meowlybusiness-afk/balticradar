name: BalticRadar collect (ss.lv)

# ss.lv only - direct + free, no proxy. Runs every 5 min in GitHub's cloud; PC can be OFF.
on:
  schedule:
    - cron: "*/5 * * * *"     # every 5 min (GitHub min; may be delayed under load)
  workflow_dispatch: {}        # also runnable manually from the Actions tab

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Collect ss.lv -> Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SS_PAGES: "10"        # ss.lv "today" scan (with details) for new listings
          SS_FULL: "1"          # also sweep the full ss.lv catalogue brand-by-brand
          SS_BRANDS_PER_RUN: "10"  # cursor advances every run; finishes well under 30-min timeout
          SS_BRAND_PAGES: "7"
          SS_SWEEP_DET: "800"   # detail-fetch up to 800 new swept cars/run (ss.lv is fast/direct -> still ~15-18 min)
          SKIP_LTEE: "1"        # autoplius/auto24 handled by the separate proxied workflow
          BACKFILL: "250"       # drain the remaining 1-photo backlog
          DEACTIVATE: "0"       # OFF during bulk load: the slow cloud cron can't re-visit every car in 3 days, so it was falsely hiding still-for-sale cars. Re-enable once the catalogue is fully loaded.
          DEACTIVATE_DAYS: "3"
          REACTIVATE: "1"       # one-shot: set falsely-hidden cars back to active
        run: python run_all.py
      # Alert emails are sent by the separate notify.yml workflow (twice a day digest).
