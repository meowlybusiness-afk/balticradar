name: BalticRadar collect (ss.lv)

# ss.lv only - direct + free, no proxy. Runs every 5 min in GitHub's cloud; PC can be OFF.
on:
  schedule:
    - cron: "*/5 * * * *"     # every 5 min (GitHub min; may be delayed under load)
  workflow_dispatch: {}        # also runnable manually from the Actions tab

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Collect ss.lv -> Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SS_PAGES: "10"        # ss.lv "today" scan (with details) for new listings
          SS_FULL: "1"          # also sweep the full ss.lv catalogue brand-by-brand
          SS_BRANDS_PER_RUN: "4"   # smaller sweep so new cars never outpace the detail-fetch
          SS_BRAND_PAGES: "4"
          SS_SWEEP_DET: "300"   # detail-fetch (full photo gallery) every new swept car -> no 1-photo cars
          SKIP_LTEE: "1"        # autoplius/auto24 handled by the separate proxied workflow
          BACKFILL: "250"       # drain the remaining 1-photo backlog faster
          DEACTIVATE: "1"       # hide listings no longer seen (removed/sold) - keeps row + VIN + history
          DEACTIVATE_DAYS: "3"  # grace period before hiding an unseen listing
        run: python run_all.py
      # Alert emails are sent by the separate notify.yml workflow (twice a day digest).
