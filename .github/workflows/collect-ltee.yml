name: BalticRadar collect (LT + EE via proxy)

# autoplius (LT) + auto24 (EE) only, routed through ScraperAPI residential proxies
# (Cloudflare blocks GitHub's datacenter IPs directly). Runs less often than ss.lv
# to protect ScraperAPI credits. Needs the SCRAPER_KEY repo secret to be set.
on:
  schedule:
    - cron: "0 6 * * *"      # ONCE A DAY. Free ScraperAPI credits are tiny, so we spend them only on
                              # catching the newest LT/EE listings. Raise this ONLY after topping up credits.
  workflow_dispatch: {}        # run manually any time from the Actions tab

jobs:
  collect-ltee:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Collect autoplius + auto24 -> Supabase (proxied)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SCRAPER_KEY: ${{ secrets.SCRAPER_KEY }}   # required: routes LT/EE through residential proxies
          SS_PAGES: "0"         # skip ss.lv here (handled by the 5-min workflow)
          AP_PAGES: "2"         # just the newest autoplius list pages (conserve free proxy credits)
          A24_PAGES: "2"        # just the newest auto24 list pages
          DETAIL_CAP: "8"       # only a few new-car detail fetches per run
          BACKFILL: "0"         # photo/date/desc backfill needs the paid proxy at scale -> OFF on free tier.
          BACKFILL_ALL: "0"     # (re-enable + raise BACKFILL once you top up ScraperAPI credits)
        run: python run_all.py
