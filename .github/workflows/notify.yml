name: BalticRadar alerts (every 20 min)

# TIMELINESS IS THE PRODUCT: the collector ingests every ~5-15 min, so alerts run on a
# similar cadence. Each run only looks at cars INGESTED SINCE THE LAST RUN, and every
# (filter, car) pair is recorded in filter_notifications -> the same car is never sent twice.
on:
  schedule:
    - cron: "*/20 * * * *"     # every 20 minutes
  workflow_dispatch:
    inputs:
      test_to:
        description: "Redirect ALL alert emails to this address (end-to-end test). Leave empty for real sends."
        required: false
        default: ""
      lookback_min:
        description: "Look back this many minutes for newly-ingested cars"
        required: false
        default: "45"
      dry_run:
        description: "1 = match + render but send nothing"
        required: false
        default: "0"

concurrency:
  group: balticradar-alerts     # never let two runs overlap and double-send
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests
      - name: Send alerts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Set the ALERT_FROM secret to "BalticRadar <alerts@yourdomain.lv>" once the domain is
          # verified in Resend. Until then the default onboarding@resend.dev ONLY delivers to the
          # Resend account owner - every other recipient is rejected with 403.
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
          SITE_URL: "https://balticradar.meowlybusiness.workers.dev"
          LOOKBACK_MIN: ${{ github.event.inputs.lookback_min || '45' }}
          TEST_TO: ${{ github.event.inputs.test_to }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          MAX_PER_EMAIL: "12"
          MAX_EMAILS: "80"
        run: python notify.py
