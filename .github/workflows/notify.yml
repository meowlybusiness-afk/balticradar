name: BalticRadar alerts

# HOW OFTEN A USER IS E-MAILED IS DECIDED IN notify.py, NOT HERE.
#
# This job used to run every 20 minutes AND e-mail on every new match, so one saved filter could
# fire up to 72 times a day. It also quietly ate Resend's free 100-e-mails-a-day account budget,
# after which EVERY user - paying ones included - received nothing at all, silently.
#
# The cron is now just a "wake up and check" tick. notify.py decides whether anyone is actually due:
#   * every filter has a cadence (daily digest by default; instant/every-few-hours = Premium)
#   * a hard per-user ceiling  (DAILY_CAP)
#   * a hard GLOBAL ceiling    (PROVIDER_DAILY_LIMIT - PROVIDER_RESERVE = 90/100), which stops
#     before the provider quota is gone and logs loudly instead of failing in silence.
# Cars that are not sent are NOT recorded as sent, so they roll into the next batch. Nothing is lost.
#
# Hourly is the finest tick worth having: the fastest cadence we offer is one e-mail per hour.
on:
  schedule:
    - cron: "7 * * * *"        # hourly tick. It is notify.py that decides who is actually due.
  workflow_dispatch:
    inputs:
      test_to:
        description: "Redirect ALL alert emails to this address (end-to-end test). Leave empty for real sends."
        required: false
        default: ""
      lookback_min:
        description: "Look back this many minutes for newly-ingested cars"
        required: false
        default: "1560"
      dry_run:
        description: "1 = match + render but send nothing"
        required: false
        default: "0"
      ignore_sent:
        description: "1 = TEST ONLY. Ignore the already-sent dedupe and do not record the send."
        required: false
        default: "0"
      only_email:
        description: "Send ONLY to this email address (targeted test). Empty = all due users."
        required: false
        default: ""

concurrency:
  group: balticradar-alerts     # never let two runs overlap and double-send
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests
      - name: Send alerts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # The sending domain balticradar.com is verified in Resend, so the default sender is now
          # alerts@balticradar.com and delivers to ALL recipients. Setting the ALERT_FROM secret is
          # optional and only needed to override this default.
          ALERT_FROM: ${{ secrets.ALERT_FROM || 'BalticRadar <alerts@balticradar.com>' }}
          SITE_URL: "https://balticradar.meowlybusiness.workers.dev"
          # must be WIDER than the slowest cadence (daily), or a digest would miss cars
          LOOKBACK_MIN: ${{ github.event.inputs.lookback_min || '1560' }}
          TEST_TO: ${{ github.event.inputs.test_to }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          IGNORE_SENT: ${{ github.event.inputs.ignore_sent }}
          ONLY_EMAIL: ${{ github.event.inputs.only_email }}
          MAX_PER_EMAIL: "12"
          MAX_EMAILS: "80"          # per RUN
          DAILY_CAP: "6"            # per USER per day, whatever their filters ask for
          PROVIDER_DAILY_LIMIT: "100"   # Resend free tier. RAISE THIS WHEN YOU UPGRADE THE PLAN.
          PROVIDER_RESERVE: "10"        # never spend the last 10 of the quota
        run: python notify.py
